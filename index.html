<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <meta http-equiv="Pragma" content="no-cache" />
    <title>MKT OS | Campaign Memory Workbench</title>
    <link rel="icon" href="data:," />
    <style>
:root {
  --bg: #f7f8fb;
  --surface: #ffffff;
  --surface-strong: #f8fafc;
  --surface-muted: #eef1f5;
  --surface-tint: #f3f6f3;
  --text: #111318;
  --text-muted: #596070;
  --text-soft: #7a8292;
  --border: #e3e7ee;
  --border-strong: #cfd6e2;
  --primary: #17463f;
  --primary-strong: #0e2f2a;
  --accent: #8a5b21;
  --info: #315f8c;
  --success: #2f684c;
  --warning: #91631b;
  --danger: #a0443d;
  --focus: #2563eb;
  --shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
  --radius: 8px;
  --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* {
  box-sizing: border-box;
}

html {
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.65), rgba(247, 248, 251, 0) 340px),
    var(--bg);
  color: var(--text);
  font-family: var(--font);
}

body {
  margin: 0;
  min-width: 320px;
}

button,
input,
select,
textarea {
  font: inherit;
}

button:focus-visible,
a:focus-visible,
[tabindex]:focus-visible {
  outline: 3px solid color-mix(in srgb, var(--focus) 55%, transparent);
  outline-offset: 2px;
}

.app-shell {
  min-height: 100vh;
}

.topbar {
  align-items: center;
  background: rgba(255, 255, 255, 0.86);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  padding: 12px 28px;
  position: sticky;
  top: 0;
  backdrop-filter: blur(16px);
  z-index: 10;
}

.brand {
  align-items: center;
  display: flex;
  gap: 10px;
  font-weight: 750;
}

.brand-mark {
  align-items: center;
  background: #111318;
  border-radius: 6px;
  color: #fff;
  display: inline-flex;
  height: 30px;
  justify-content: center;
  width: 30px;
}

.topbar-meta {
  color: var(--text-muted);
  font-size: 13px;
}

.page {
  display: grid;
  gap: 14px;
  margin: 0 auto;
  max-width: 1380px;
  padding: 24px 28px 36px;
}

.campaign-hero {
  background:
    radial-gradient(circle at top right, rgba(37, 99, 235, 0.1), transparent 32%),
    linear-gradient(135deg, #ffffff 0%, #f9fafb 55%, #f1f6f4 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: grid;
  gap: 18px;
  grid-template-columns: 1.35fr 0.65fr;
  padding: 16px 22px;
}

.eyebrow {
  color: var(--primary);
  font-size: 12px;
  font-weight: 760;
  letter-spacing: 0;
  text-transform: uppercase;
}

h1,
h2,
h3,
p {
  margin: 0;
}

h1 {
  font-size: 30px;
  line-height: 1.1;
  margin-top: 6px;
}

.hero-copy {
  color: var(--text-muted);
  font-size: 15px;
  line-height: 1.65;
  margin-top: 12px;
  max-width: 760px;
}

.thesis {
  background: rgba(255, 255, 255, 0.86);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-top: 12px;
  padding: 12px;
}

.thesis-label {
  color: var(--text-soft);
  font-size: 12px;
  margin-bottom: 6px;
}

.hero-side {
  align-content: start;
  display: grid;
  gap: 8px;
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.operating-model {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}

.operating-model span {
  background: rgba(17, 19, 24, 0.04);
  border: 1px solid var(--border);
  border-radius: 999px;
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 720;
  padding: 5px 9px;
}

.status-card,
.panel,
.belief-card,
.conflict-card,
.feed-item,
.observation-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}

.status-card {
  padding: 10px 12px;
}

.status-card strong {
  display: block;
  font-size: 15px;
  margin-top: 5px;
}

.status-card-inverted {
  background: #111318;
  border-color: #111318;
  color: #fff;
}

.status-card-inverted .label {
  color: rgba(255, 255, 255, 0.62);
}

.section-grid {
  display: grid;
  gap: 18px;
  grid-template-columns: minmax(0, 1fr) minmax(360px, 0.62fr);
}

.panel {
  box-shadow: 0 1px 0 rgba(15, 23, 42, 0.02);
  padding: 20px;
}

.panel-emphasis {
  background:
    linear-gradient(90deg, rgba(23, 70, 63, 0.045), transparent 42%),
    var(--surface);
}

.belief-panel {
  border-color: #cfd6e2;
  box-shadow: var(--shadow);
}

.conflict-panel {
  border-color: #ead398;
}

.brain-panel {
  background:
    radial-gradient(circle at top right, rgba(59, 130, 246, 0.16), transparent 36%),
    linear-gradient(135deg, #151922 0%, #0f131a 58%, #0b2f2a 100%);
  border-color: rgba(255, 255, 255, 0.08);
  box-shadow: 0 24px 60px rgba(15, 23, 42, 0.18);
  color: #fff;
}

.brain-panel .panel-header h2,
.brain-panel .value {
  color: #fff;
}

.brain-panel .panel-header p,
.brain-panel .label {
  color: rgba(255, 255, 255, 0.64);
}

.brain-panel .badge.info {
  background: rgba(255, 255, 255, 0.1);
  border-color: rgba(255, 255, 255, 0.16);
  color: rgba(255, 255, 255, 0.82);
}

.brain-panel .reasoning-list li {
  background: rgba(255, 255, 255, 0.07);
  border-color: rgba(255, 255, 255, 0.12);
  color: rgba(255, 255, 255, 0.78);
}

.brain-principle {
  align-items: center;
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: var(--radius);
  display: flex;
  justify-content: space-between;
  margin-bottom: 16px;
  padding: 12px 14px;
}

.brain-principle strong {
  font-size: 18px;
}

.context-panel {
  background: rgba(255, 255, 255, 0.62);
  box-shadow: none;
}

.context-panel .panel-header,
.context-panel .context-list {
  opacity: 0.82;
}

.panel-header {
  align-items: start;
  display: flex;
  gap: 16px;
  justify-content: space-between;
  margin-bottom: 18px;
}

.panel-header h2 {
  font-size: 18px;
}

.panel-header p {
  color: var(--text-muted);
  font-size: 14px;
  line-height: 1.5;
  margin-top: 5px;
}

.badge {
  align-items: center;
  background: var(--surface-muted);
  border: 1px solid var(--border);
  border-radius: 999px;
  color: var(--text-muted);
  display: inline-flex;
  font-size: 12px;
  font-weight: 720;
  gap: 6px;
  padding: 5px 9px;
  white-space: nowrap;
}

.badge.success {
  background: #eef7f1;
  border-color: #cce4d3;
  color: var(--success);
}

.badge.warning {
  background: #fff5df;
  border-color: #ead398;
  color: var(--warning);
}

.badge.danger {
  background: #f8e8e6;
  border-color: #e5b8b3;
  color: var(--danger);
}

.badge.info {
  background: #edf5ff;
  border-color: #cbdcf3;
  color: var(--info);
}

.context-list,
.stack {
  display: grid;
  gap: 12px;
}

.context-row {
  border-bottom: 1px solid var(--border);
  display: grid;
  gap: 4px;
  padding-bottom: 12px;
}

.context-row:last-child {
  border-bottom: 0;
  padding-bottom: 0;
}

.label {
  color: var(--text-soft);
  font-size: 12px;
  font-weight: 720;
}

.value {
  color: var(--text);
  font-size: 14px;
  line-height: 1.55;
}

.belief-grid {
  display: grid;
  gap: 12px;
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.belief-card {
  display: grid;
  gap: 10px;
  align-content: start;
  min-height: 124px;
  padding: 14px;
}

.belief-card.contested {
  border-color: #e1ba84;
}

.belief-card.active {
  border-color: #bfdcc8;
}

.belief-card.validating {
  border-color: #c8d9ef;
}

.belief-top {
  align-items: start;
  display: flex;
  flex-direction: column;
  gap: 8px;
  justify-content: space-between;
}

.belief-statement {
  font-size: 14px;
  font-weight: 760;
  line-height: 1.42;
}

.confidence {
  align-items: center;
  display: grid;
  gap: 6px;
  grid-template-columns: auto auto 1fr;
  text-align: left;
  width: 100%;
}

.confidence strong {
  font-size: 18px;
}

.meter {
  background: var(--surface-muted);
  border-radius: 999px;
  height: 8px;
  overflow: hidden;
  width: 100%;
}

.meter > span {
  background: linear-gradient(90deg, var(--primary), #3b82f6);
  display: block;
  height: 100%;
}

.evidence-list {
  display: grid;
  gap: 7px;
  margin: 0;
  padding: 0;
}

.evidence-list li {
  color: var(--text-muted);
  font-size: 13px;
  line-height: 1.45;
  list-style: none;
  padding-left: 15px;
  position: relative;
}

.evidence-list li::before {
  background: var(--primary);
  border-radius: 50%;
  content: "";
  height: 5px;
  left: 0;
  position: absolute;
  top: 8px;
  width: 5px;
}

.conflict-card,
.feed-item,
.observation-card {
  display: grid;
  gap: 12px;
  padding: 15px;
}

.conflict-card {
  border-color: #ead398;
}

.conflict-title,
.feed-title {
  align-items: center;
  display: flex;
  gap: 10px;
  justify-content: space-between;
}

.conflict-badges {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: flex-end;
}

.conflict-title h3,
.feed-title h3 {
  font-size: 15px;
}

.split {
  display: grid;
  gap: 12px;
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.argument {
  background: var(--surface-strong);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
}

.conflict-resolution {
  background: #fff8e8;
  border-color: #ead398;
}

.argument p {
  color: var(--text-muted);
  font-size: 13px;
  line-height: 1.45;
  margin-top: 5px;
}

.reasoning-list {
  display: grid;
  gap: 10px;
  margin: 0;
  padding: 0;
}

.reasoning-list li {
  background: var(--surface-strong);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-muted);
  line-height: 1.5;
  list-style: none;
  padding: 12px;
}

.compact-list {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.delegation-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: grid;
  gap: 9px;
  padding: 14px;
}

.delegation-card h3 {
  font-size: 15px;
}

.delegation-card p,
.feed-item p,
.observation-card p {
  color: var(--text-muted);
  font-size: 13px;
  line-height: 1.5;
}

.team-grid {
  display: grid;
  gap: 12px;
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.outcome-grid {
  display: grid;
  gap: 14px;
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.learning-card {
  background:
    linear-gradient(135deg, rgba(49, 95, 140, 0.2), transparent 44%),
    var(--primary-strong);
  border-radius: var(--radius);
  color: #fff;
  display: grid;
  gap: 12px;
  padding: 18px;
}

.learning-card p {
  color: rgba(255, 255, 255, 0.78);
  font-size: 14px;
  line-height: 1.5;
}

.state-panel {
  background: var(--surface-strong);
  border: 1px dashed var(--border-strong);
  border-radius: var(--radius);
  color: var(--text-muted);
  padding: 16px;
}

@media (max-width: 980px) {
  .campaign-hero,
  .section-grid,
  .split,
  .belief-grid,
  .compact-list,
  .team-grid,
  .outcome-grid {
    grid-template-columns: 1fr;
  }

  .page {
    padding: 18px;
  }

  .topbar {
    padding: 12px 18px;
  }

  h1 {
    font-size: 30px;
  }
}

@media (max-width: 640px) {
  .topbar-meta {
    display: none;
  }

  .campaign-hero,
  .panel {
    padding: 16px;
  }

  .belief-top,
  .panel-header,
  .conflict-title,
  .feed-title {
    align-items: start;
    flex-direction: column;
  }

  .confidence {
    text-align: left;
    width: 100%;
  }
}

.cockpit-hero {
  background:
    radial-gradient(circle at top right, rgba(23, 70, 63, 0.12), transparent 34%),
    linear-gradient(135deg, #ffffff 0%, #f7f9fb 58%, #eef4f1 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: grid;
  gap: 22px;
  grid-template-columns: minmax(0, 1.2fr) minmax(360px, 0.8fr);
  padding: 22px;
}

.cockpit-main {
  display: grid;
  align-content: start;
}

.alignment-bridge {
  display: grid;
  gap: 12px;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  margin-top: 18px;
}

.alignment-bridge > div {
  background: rgba(255, 255, 255, 0.76);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: grid;
  gap: 8px;
  padding: 14px;
}

.alignment-bridge strong {
  font-size: 14px;
  line-height: 1.5;
}

.cockpit-side {
  display: grid;
  gap: 12px;
}

.stage-card {
  background: #111318;
  border-radius: var(--radius);
  color: #fff;
  display: grid;
  gap: 8px;
  padding: 16px;
}

.stage-card .label,
.stage-card p {
  color: rgba(255, 255, 255, 0.66);
}

.stage-card strong {
  font-size: 24px;
}

.stage-card p {
  font-size: 13px;
  line-height: 1.45;
}

.stage-track {
  display: grid;
  gap: 10px;
}

.stage-pill {
  background: rgba(255, 255, 255, 0.7);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: grid;
  gap: 8px;
  padding: 12px;
}

.stage-pill.active {
  border-color: #bfdcc8;
  box-shadow: 0 10px 30px rgba(23, 70, 63, 0.08);
}

.stage-pill div {
  align-items: start;
  display: grid;
  gap: 8px;
}

.stage-pill strong {
  font-size: 13px;
  line-height: 1.45;
}

.stage-pill span:not(.badge) {
  color: var(--text-muted);
  font-size: 12px;
}

.judgement-panel {
  border-color: var(--border-strong);
  box-shadow: var(--shadow);
}

.judgement-map {
  display: grid;
  gap: 16px;
  grid-template-columns: minmax(0, 0.9fr) minmax(320px, 1.05fr) minmax(0, 0.9fr);
}

.map-column {
  display: grid;
  gap: 14px;
}

.map-card,
.central-judgement {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: grid;
  gap: 12px;
  padding: 16px;
}

.map-card.support {
  background: #f2f8f4;
  border-color: #cce4d3;
}

.map-card.challenge {
  background: #fff8e8;
  border-color: #ead398;
}

.map-card.question {
  background: #f7f9fc;
}

.map-card.messaging {
  background: #f3f6f3;
  border-color: #d6e2dc;
}

.central-judgement {
  align-content: center;
  background:
    radial-gradient(circle at top right, rgba(49, 95, 140, 0.18), transparent 38%),
    #111318;
  color: #fff;
  min-height: 320px;
}

.central-judgement h2 {
  color: #fff;
  font-size: 28px;
  line-height: 1.16;
}

.central-judgement p {
  color: rgba(255, 255, 255, 0.72);
  font-size: 14px;
  line-height: 1.6;
}

.judgement-status {
  align-items: center;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.confidence-shift {
  background: rgba(47, 104, 76, 0.1);
  border: 1px solid rgba(47, 104, 76, 0.16);
  border-radius: 999px;
  color: var(--success);
  display: inline-flex;
  font-size: 12px;
  font-weight: 760;
  padding: 5px 9px;
  width: fit-content;
}

.central-judgement .confidence-shift {
  background: rgba(255, 255, 255, 0.08);
  border-color: rgba(255, 255, 255, 0.14);
  color: rgba(255, 255, 255, 0.84);
}

.message-pair {
  background: rgba(255, 255, 255, 0.72);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
}

.message-pair.after {
  border-color: #bfdcc8;
}

.message-pair strong {
  display: block;
  font-size: 12px;
  margin-bottom: 6px;
}

.message-pair p {
  color: var(--text-muted);
  font-size: 13px;
  line-height: 1.45;
}

.cockpit-grid {
  display: grid;
  gap: 18px;
  grid-template-columns: minmax(0, 0.95fr) minmax(420px, 1.05fr);
}

.signal-card,
.recommendation-content,
.result-content {
  display: grid;
  gap: 16px;
}

.signal-card h2,
.recommendation-content h2,
.result-content h2 {
  font-size: 20px;
  line-height: 1.25;
}

.signal-card p,
.recommendation-content p,
.result-content p {
  color: var(--text-muted);
  font-size: 14px;
  line-height: 1.6;
}

.signal-meta {
  align-items: center;
  color: var(--text-soft);
  display: flex;
  flex-wrap: wrap;
  font-size: 12px;
  gap: 8px;
}

.signal-link,
.discussion-box,
.recommendation-side,
.next-actions {
  background: var(--surface-strong);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: grid;
  gap: 8px;
  padding: 13px;
}

.signal-link strong {
  font-size: 14px;
  line-height: 1.45;
}

.signal-link em {
  color: var(--warning);
  font-size: 12px;
  font-style: normal;
  font-weight: 760;
}

.recommendation-panel {
  background:
    linear-gradient(135deg, rgba(23, 70, 63, 0.06), transparent 46%),
    var(--surface);
}

.recommendation-content {
  grid-template-columns: minmax(0, 1fr) minmax(220px, 0.42fr);
}

.recommendation-side strong {
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
}

.primary-action {
  align-items: center;
  background: var(--primary);
  border: 1px solid var(--primary);
  border-radius: var(--radius);
  color: #fff;
  cursor: pointer;
  display: inline-flex;
  font-weight: 760;
  height: 42px;
  justify-content: center;
  margin-top: 16px;
  min-width: 160px;
  padding: 0 16px;
}

.primary-action:hover {
  background: var(--primary-strong);
}

.primary-action:disabled {
  background: var(--surface-muted);
  border-color: var(--border);
  color: var(--text-soft);
  cursor: default;
}

.evidence-grid {
  display: grid;
  gap: 14px;
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.data-evidence-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: grid;
  gap: 10px;
  padding: 15px;
}

.data-evidence-top {
  align-items: start;
  display: flex;
  justify-content: space-between;
  gap: 14px;
}

.data-evidence-top strong {
  color: var(--primary);
  font-size: 28px;
  line-height: 1;
}

.data-movement {
  color: var(--text);
  font-size: 13px;
  font-weight: 720;
}

.relation-chip {
  background: #edf5ff;
  border: 1px solid #cbdcf3;
  border-radius: 999px;
  color: var(--info);
  font-size: 12px;
  font-weight: 760;
  padding: 5px 9px;
  width: fit-content;
}

.linked-judgement {
  color: var(--text-soft);
  font-size: 12px;
  line-height: 1.4;
}

.result-panel {
  border-style: dashed;
}

.result-panel.confirmed {
  background:
    linear-gradient(135deg, rgba(47, 104, 76, 0.08), transparent 46%),
    var(--surface);
  border-color: #cce4d3;
  border-style: solid;
}

.result-content {
  grid-template-columns: minmax(0, 0.75fr) minmax(320px, 1fr);
}

@media (max-width: 1080px) {

  padding: 18px 14px;
  position: sticky;
  top: 64px;
}

.ops-sidebar-brand {
  border-bottom: 1px solid var(--ops-line);
  gap: 12px;
  padding: 0 12px 18px;
}

.ops-brand-mark {
  align-items: center;
  background: #eaf3ff;
  border: 1px solid rgba(148, 163, 184, 0.35);
  border-radius: 8px;
  display: inline-flex;
  height: 38px;
  justify-content: center;
  overflow: hidden;
  width: 38px;
}

.ops-brand-avatar {
  display: block;
  height: 34px;
  width: 34px;
}

.avatar-bg {
  fill: #dbeafe;
}

.avatar-head,
.avatar-body,
.avatar-smile {
  fill: none;
  stroke: #1d4ed8;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-width: 2.4;
}

.avatar-head {
  fill: #f8fafc;
}

.ops-sidebar-brand strong {
  display: block;
  font-size: 19px;
}

.ops-sidebar-brand span,
.ops-sidebar-footer span {
  color: var(--ops-muted);
  display: block;
  font-size: 12px;
  margin-top: 4px;
}

.ops-nav {
  align-content: start;
  display: grid;
  gap: 8px;
  padding: 18px 0;
}

.ops-nav-item {
  background: transparent;
  border: 1px solid transparent;
  border-radius: 8px;
  cursor: pointer;
  display: grid;
  gap: 4px;
  padding: 12px;
  text-align: left;
}

.ops-nav-item strong {
  font-size: 15px;
  line-height: 1.35;
}

.ops-nav-item span {
  color: var(--ops-soft);
  font-size: 12px;
  line-height: 1.4;
}

.ops-nav-item:hover,
.ops-nav-item.active {
  background: rgba(79, 131, 255, 0.1);
  border-color: rgba(79, 131, 255, 0.32);
}

.ops-nav-item.active strong {
  color: #8fb0ff;
}

.ops-sidebar-footer {
  border-top: 1px solid var(--ops-line);
  color: var(--ops-muted);
  padding: 16px 12px 2px;
}

.ops-sidebar-footer strong {
  color: var(--ops-text);
  display: block;
  font-size: 13px;
}

.ops-main {
  display: grid;
  gap: 18px;
  min-width: 0;
  padding: 22px;
}

.ops-command-header,
.campaign-rail,
.operating-tree,
.node-detail-panel {
  background: rgba(21, 24, 32, 0.88);
  border: 1px solid var(--ops-line);
  border-radius: 8px;
}

.ops-command-header {
  display: grid;
  gap: 18px;
  grid-template-columns: minmax(360px, 1.05fr) minmax(420px, 0.95fr);
  padding: 20px;
}

.ops-command-copy h1 {
  color: var(--ops-text);
  font-size: 28px;
  line-height: 1.15;
}

.ops-command-copy p:not(.ops-eyebrow) {
  color: var(--ops-muted);
  font-size: 14px;
  line-height: 1.65;
  margin-top: 10px;
  max-width: 820px;
}

.ops-pulse-panel {
  background:
    linear-gradient(135deg, rgba(111, 149, 255, 0.14), transparent 48%),
    rgba(255, 255, 255, 0.045);
  border: 1px solid var(--ops-line);
  border-radius: 8px;
  display: grid;
  gap: 12px;
  padding: 16px;
}

.ops-pulse-head {
  align-items: center;
  display: flex;
  gap: 10px;
  justify-content: space-between;
}

.ops-pulse-head span,
.ops-pulse-head strong {
  color: var(--ops-muted);
  font-size: 12px;
}

.ops-pulse-panel h2 {
  color: var(--ops-text);
  font-size: 22px;
  line-height: 1.22;
}

.ops-pulse-panel > p {
  color: #d5dbe6;
  font-size: 13px;
  line-height: 1.55;
}

.ops-pulse-grid {
  display: grid;
  gap: 10px;
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.ops-pulse-card {
  background: rgba(255, 255, 255, 0.055);
  border: 1px solid var(--ops-line);
  border-radius: 8px;
  display: grid;
  gap: 5px;
  padding: 10px;
}

.ops-pulse-card span {
  color: var(--ops-muted);
  font-size: 11px;
  font-weight: 760;
}

.ops-pulse-card strong {
  color: var(--ops-text);
  font-size: 14px;
  line-height: 1.35;
}

.ops-pulse-card p {
  color: #c7cedb;
  font-size: 12px;
  line-height: 1.35;
}

.ops-pulse-card.warning {
  border-color: rgba(246, 184, 79, 0.42);
}

.ops-pulse-card.info {
  border-color: rgba(111, 149, 255, 0.44);
}

.ops-pulse-card.success {
  border-color: rgba(81, 213, 138, 0.42);
}

.ops-eyebrow {
  color: #8fb0ff;
  font-size: 12px;
  font-weight: 780;
  margin: 0 0 6px;
}

.ops-rule-strip {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
}

.ops-rule-strip span {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid var(--ops-line);
  border-radius: 999px;
  color: var(--ops-muted);
  font-size: 12px;
  padding: 5px 9px;
}

.ops-command-metrics {
  display: grid;
  gap: 10px;
  grid-column: 1 / -1;
  grid-template-columns: repeat(4, minmax(0, 1fr));
}

.ops-metric {
  background: rgba(255, 255, 255, 0.045);
  border: 1px solid var(--ops-line);
  border-radius: 8px;
  display: grid;
  gap: 5px;
  padding: 12px;
}

.ops-metric span,
.ops-metric small,
.ops-filter span,
.campaign-switch small,
.tree-level-copy span,
.tree-node small,
.tree-node em,
.node-detail-header span,
.node-owner small,
.detail-story span,
.linked-node small {
  color: var(--ops-muted);
}

.ops-metric strong {
  color: var(--ops-text);
  font-size: 24px;
}

.ops-metric small {
  font-size: 12px;
  line-height: 1.35;
}

.ops-filter-row {
  display: grid;
  gap: 10px;
  grid-column: 1 / -1;
  grid-template-columns: repeat(4, minmax(0, 1fr));
}

.ops-filter {
  display: grid;
  gap: 6px;
}

.ops-filter span {
  font-size: 12px;
  font-weight: 720;
}

.ops-filter select {
  background: #0f1118;
  border: 1px solid var(--ops-line);
  border-radius: 8px;
  color: var(--ops-text);
  min-height: 38px;
  padding: 0 10px;
  width: 100%;
}

.ops-operating-layout {
  display: grid;
  gap: 16px;
  grid-template-columns: 360px minmax(0, 1fr);
  min-width: 0;
}

.campaign-rail {
  align-content: start;
  display: grid;
  gap: 10px;
  padding: 14px;
}

.rail-header,
.tree-header {
  justify-content: space-between;
}

.rail-header h2,
.tree-header h2,
.node-detail-header h2 {
  color: var(--ops-text);
  font-size: 18px;
}

.rail-header > span,
.tree-header > span {
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid var(--ops-line);
  border-radius: 999px;
  color: var(--ops-muted);
  font-size: 12px;
  padding: 5px 9px;
}

.campaign-switch {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid var(--ops-line);
  border-radius: 8px;
  cursor: pointer;
  display: grid;
  gap: 7px;
  min-width: 0;
  padding: 13px;
  text-align: left;
}

.campaign-switch:hover,
.campaign-switch.active {
  border-color: rgba(79, 131, 255, 0.72);
}

.campaign-switch.active {
  background: linear-gradient(135deg, rgba(79, 131, 255, 0.14), rgba(46, 213, 115, 0.04));
}

.campaign-type {
  color: #8fb0ff;
  font-size: 12px;
  font-weight: 780;
}

.campaign-switch strong {
  color: var(--ops-text);
  font-size: 17px;
  line-height: 1.3;
}

.campaign-switch p {
  color: #c2c8d6;
  font-size: 13px;
  line-height: 1.45;
}

.stream-insight {
  background: rgba(255, 255, 255, 0.045);
  border: 1px solid var(--ops-line);
  border-radius: 8px;
  display: grid;
  gap: 4px;
  padding: 9px;
}

.stream-insight span {
  color: var(--ops-soft);
  font-size: 11px;
  font-weight: 780;
  text-transform: uppercase;
}

.stream-insight em {
  color: #d8deea;
  font-size: 12px;
  font-style: normal;
  line-height: 1.4;
}

.campaign-switch-meta {
  justify-content: space-between;
}

.campaign-switch-meta span {
  color: var(--ops-muted);
  font-size: 12px;
}

.urgency {
  border-radius: 999px;
  padding: 4px 8px;
}

.urgency.high {
  background: rgba(255, 91, 95, 0.13);
  color: #ff8a8d;
}

.urgency.medium {
  background: rgba(245, 166, 35, 0.13);
  color: #ffc567;
}

.urgency.low {
  background: rgba(46, 213, 115, 0.13);
  color: #69e79a;
}

.ops-operating-canvas {
  display: grid;
  gap: 16px;
  grid-template-columns: minmax(520px, 1fr) minmax(380px, 0.56fr);
  min-width: 0;
}

.operating-tree,
.node-detail-panel {
  align-content: start;
  display: grid;
  gap: 14px;
  padding: 16px;
}

.campaign-context-card {
  background: rgba(255, 255, 255, 0.045);
  border: 1px solid var(--ops-line);
  border-radius: 8px;
  display: grid;
  gap: 14px;
  grid-template-columns: minmax(0, 1fr) minmax(280px, 0.75fr);
  padding: 14px;
}

.campaign-context-card span {
  color: #8fb0ff;
  font-size: 12px;
  font-weight: 780;
}

.campaign-context-card h3 {
  color: var(--ops-text);
  font-size: 22px;
  margin-top: 5px;
}

.campaign-context-card p,
.campaign-context-card dd {
  color: #c2c8d6;
  font-size: 13px;
  line-height: 1.55;
}

.campaign-context-card dl {
  display: grid;
  gap: 8px;
  margin: 0;
}

.campaign-context-card div {
  min-width: 0;
}

.campaign-context-card dt {
  color: var(--ops-soft);
  font-size: 11px;
  font-weight: 760;
  margin-bottom: 3px;
}

.campaign-context-card dd {
  margin: 0;
}

.tree-levels {
  display: grid;
  gap: 10px;
}

.context-delta-grid {
  display: grid;
  gap: 10px;
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.context-delta {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid var(--ops-line);
  border-radius: 8px;
  display: grid;
  gap: 6px;
  padding: 12px;
}

.context-delta.warning {
  border-color: rgba(246, 184, 79, 0.42);
}

.context-delta.info {
  border-color: rgba(111, 149, 255, 0.4);
}

.context-delta.success {
  border-color: rgba(81, 213, 138, 0.4);
}

.context-delta span {
  color: var(--ops-muted);
  font-size: 11px;
  font-weight: 760;
}

.context-delta strong {
  color: var(--ops-text);
  font-size: 14px;
  line-height: 1.35;
}

.context-delta p,
.context-delta em {
  color: #c7cedb;
  font-size: 12px;
  font-style: normal;
  line-height: 1.4;
}

.context-delta em {
  color: var(--ops-muted);
}

.tree-level {
  border-left: 2px solid var(--ops-line-strong);
  display: grid;
  gap: 10px;
  grid-template-columns: 180px minmax(0, 1fr);
  padding-left: 12px;
}

.tree-level-copy {
  align-content: start;
  display: grid;
  gap: 5px;
}

.tree-level-copy strong {
  color: var(--ops-text);
  font-size: 14px;
  line-height: 1.35;
}

.tree-level-copy span {
  font-size: 12px;
  line-height: 1.4;
}

.tree-node-list {
  display: grid;
  gap: 8px;
}

.tree-node {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid var(--ops-line);
  border-radius: 8px;
  cursor: pointer;
  display: grid;
  gap: 5px;
  min-width: 0;
  padding: 10px;
  text-align: left;
}

.tree-node:hover,
.tree-node.active {
  border-color: rgba(79, 131, 255, 0.72);
}

.tree-node.active {
  background: rgba(79, 131, 255, 0.1);
}

.tree-node strong {
  color: var(--ops-text);
  font-size: 14px;
  line-height: 1.35;
}

.tree-node small,
.tree-node em {
  font-size: 12px;
  font-style: normal;
  line-height: 1.35;
}

.node-status {
  border-radius: 999px;
  display: inline-flex;
  font-size: 11px;
  font-weight: 780;
  justify-self: start;
  padding: 3px 7px;
}

.node-status.success {
  background: rgba(46, 213, 115, 0.13);
  color: #69e79a;
}

.node-status.warning {
  background: rgba(245, 166, 35, 0.14);
  color: #ffc567;
}

.node-status.info {
  background: rgba(79, 131, 255, 0.14);
  color: #8fb0ff;
}

.node-status.muted {
  background: rgba(255, 255, 255, 0.07);
  color: var(--ops-muted);
}

.node-detail-panel {
  position: sticky;
  top: 84px;
}

.node-detail-header {
  align-items: start;
  gap: 12px;
  justify-content: space-between;
}

.node-detail-header h2 {
  line-height: 1.25;
}

.node-detail-header span {
  display: block;
  font-size: 13px;
  margin-top: 5px;
}

.node-owner {
  background: rgba(255, 255, 255, 0.045);
  border: 1px solid var(--ops-line);
  border-radius: 8px;
  min-width: 116px;
  padding: 9px;
}

.node-owner small {
  display: block;
  font-size: 11px;
  margin-bottom: 4px;
}

.node-owner strong {
  font-size: 13px;
}

.chain-position,
.detail-block {
  background: rgba(255, 255, 255, 0.045);
  border: 1px solid var(--ops-line);
  border-radius: 8px;
  display: grid;
  gap: 10px;
  padding: 12px;
}

.chain-position > span {
  color: var(--ops-muted);
  font-size: 12px;
  font-weight: 760;
}

.chain-position div {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
}

.chain-position button,
.linked-node {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid var(--ops-line);
  border-radius: 999px;
  cursor: pointer;
  font-size: 12px;
  padding: 6px 8px;
}

.chain-position button.active {
  background: rgba(79, 131, 255, 0.16);
  border-color: rgba(79, 131, 255, 0.72);
  color: #a9c0ff;
}

.detail-story {
  display: grid;
  gap: 10px;
}

.detail-story section {
  border-left: 2px solid var(--ops-blue);
  display: grid;
  gap: 5px;
  padding-left: 10px;
}

.detail-story section:nth-child(2) {
  border-left-color: var(--ops-amber);
}

.detail-story section:nth-child(3) {
  border-left-color: var(--ops-green);
}

.detail-story section:nth-child(4) {
  border-left-color: var(--ops-red);
}

.detail-story span {
  font-size: 12px;
  font-weight: 780;
}

.detail-story p {
  color: #d4d9e5;
  font-size: 13px;
  line-height: 1.55;
}

.detail-block h3 {
  color: var(--ops-text);
  font-size: 14px;
}

.detail-list {
  display: grid;
  gap: 8px;
  margin: 0;
  padding: 0;
}

.detail-list li {
  color: #c2c8d6;
  font-size: 13px;
  line-height: 1.5;
  list-style: none;
  padding-left: 13px;
  position: relative;
}

.detail-list li::before {
  background: var(--ops-blue);
  border-radius: 50%;
  content: "";
  height: 5px;
  left: 0;
  position: absolute;
  top: 9px;
  width: 5px;
}

.linked-node {
  border-radius: 8px;
  display: grid;
  gap: 4px;
  text-align: left;
  width: 100%;
}

.context-link {
  cursor: default;
}

.impact-team-list,
.move-actions,
.evidence-chip-grid {
  display: grid;
  gap: 8px;
}

.impact-team-list {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.impact-team-list span {
  background: rgba(111, 149, 255, 0.12);
  border: 1px solid rgba(111, 149, 255, 0.26);
  border-radius: 999px;
  color: #b9c9ff;
  font-size: 12px;
  font-weight: 760;
  padding: 6px 8px;
  text-align: center;
}

.evidence-chip-grid {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.evidence-chip {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid var(--ops-line);
  border-radius: 8px;
  display: grid;
  gap: 5px;
  padding: 10px;
}

.evidence-chip span,
.evidence-chip em {
  color: var(--ops-muted);
  font-size: 11px;
  font-style: normal;
  line-height: 1.35;
}

.evidence-chip strong {
  color: var(--ops-green);
  font-size: 22px;
  line-height: 1;
}

.evidence-chip p,
.memory-writeback,
.mock-action-note {
  color: #c7cedb;
  font-size: 13px;
  line-height: 1.5;
}

.move-actions {
  grid-template-columns: 1fr;
}

.move-action {
  align-items: center;
  border: 1px solid var(--ops-line);
  border-radius: 8px;
  cursor: pointer;
  display: inline-flex;
  font-size: 13px;
  font-weight: 780;
  justify-content: center;
  min-height: 38px;
  padding: 8px 10px;
}

.move-action.primary {
  background: var(--ops-blue);
  border-color: var(--ops-blue);
  color: #09101d;
}

.move-action.secondary {
  background: rgba(255, 255, 255, 0.08);
  color: var(--ops-text);
}

.move-action.ghost {
  background: transparent;
  color: var(--ops-muted);
}

.move-action.completed,
.move-action:disabled {
  background: rgba(81, 213, 138, 0.12);
  border-color: rgba(81, 213, 138, 0.3);
  color: #8ce6ad;
  cursor: default;
}

.linked-node span {
  color: #8fb0ff;
  font-size: 11px;
  font-weight: 780;
}

.linked-node strong {
  color: var(--ops-text);
  font-size: 13px;
}

.ops-empty {
  background: rgba(255, 255, 255, 0.04);
  border: 1px dashed var(--ops-line-strong);
  border-radius: 8px;
  color: var(--ops-muted);
  font-size: 13px;
  line-height: 1.5;
  padding: 16px;
}

.ops-empty.compact {
  margin: 0;
  padding: 12px;
}

@media (max-width: 1280px) {
  .ops-workbench,
  .ops-operating-layout,
  .ops-operating-canvas,
  .ops-command-header,
  .campaign-context-card {
    grid-template-columns: 1fr;
  }

  .ops-sidebar,
  .node-detail-panel {
    position: static;
  }
}

@media (max-width: 820px) {
  .ops-topbar {
    align-items: start;
    gap: 10px;
    height: auto;
    padding: 14px;
  }

  .ops-topbar,
  .ops-topbar-title,
  .ops-user-pill,
  .node-detail-header {
    flex-direction: column;
  }

  .ops-main {
    padding: 14px;
  }

  .ops-filter-row,
  .ops-command-metrics,
  .ops-pulse-grid,
  .context-delta-grid,
  .evidence-chip-grid,
  .impact-team-list,
  .tree-level {
    grid-template-columns: 1fr;
  }

  .tree-level {
    padding-left: 10px;
  }
}

/* v0.5.1 PC workbench layout */
body {
  overflow-x: auto;
}

.ops-shell {
  --ops-bg: #f3f6fa;
  --ops-surface: #ffffff;
  --ops-surface-2: #f8fafc;
  --ops-line: #d9e1ec;
  --ops-line-strong: #c6d0df;
  --ops-text: #101725;
  --ops-muted: #627084;
  --ops-soft: #8792a3;
  --ops-blue: #3768d8;
  --ops-green: #2f8f61;
  --ops-amber: #b7791f;
  --ops-red: #c2413d;
  background: var(--ops-bg);
  color: var(--ops-text);
}

.ops-topbar {
  background: rgba(255, 255, 255, 0.94);
  border-bottom: 1px solid var(--ops-line);
  color: var(--ops-text);
  flex-direction: row;
  height: 56px;
  min-width: 1320px;
  padding: 0 18px;
}

.ops-topbar-title,
.ops-user-pill {
  flex-direction: row;
}

.ops-topbar-title strong {
  font-size: 20px;
}

.ops-topbar-title span,
.ops-user-pill span {
  color: var(--ops-muted);
}

.ops-user-pill {
  background: var(--ops-surface-2);
  border-color: var(--ops-line);
}

.ops-workbench {
  align-items: stretch;
  display: grid;
  grid-template-columns: 236px 360px minmax(720px, 1fr);
  min-height: calc(100vh - 56px);
  min-width: 1320px;
  overflow: visible;
}

.ops-workbench.sidebar-collapsed {
  grid-template-columns: 72px 380px minmax(760px, 1fr);
}

.ops-sidebar {
  background: #111827;
  border-right: 1px solid rgba(255, 255, 255, 0.08);
  color: #f8fafc;
  min-height: calc(100vh - 56px);

function escapeText(value) {
  return String(value || "")
    .trim()
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function asList(value) {
  if (Array.isArray(value)) return value;
  return value ? [value] : [];
}

function campaignClassMeta(campaign) {
  if (campaign.productLine === "区域项目") {
    const regionLabels = {
      大促: { label: "大促", badge: "大促", english: "Promo", tone: "promo" },
      节日: { label: "节日", badge: "节日", english: "Seasonal", tone: "festival" },
      节点: { label: "节日", badge: "节日", english: "Seasonal", tone: "festival" },
      "Always-on": { label: "Always-on", badge: "Always", english: "Always-on", tone: "always" },
      "Always on": { label: "Always on", badge: "Always", english: "Always-on", tone: "always" },
      场景: { label: "场景", badge: "场景", english: "Scenario", tone: "scenario" },
    };
    return regionLabels[campaign.type] || regionLabels[campaign.stage] || regionLabels[campaign.projectShort] || regionLabels["Always on"];
  }

  const key = campaign.campaignClass || (campaign.type === "新品上市" ? "launch" : campaign.type === "刷新" ? "refresh" : "sustaining");
  const labels = {
    launch: { label: "新品上市", english: "Launch", tone: "launch" },
    sustaining: { label: "持续增长", english: "Sustaining", tone: "sustaining" },
    refresh: { label: "品牌/产品刷新", english: "Refresh", tone: "refresh" },
  };

  return labels[key] || labels.sustaining;
}

function campaignIdsForNode(node) {
  const ownIds = asList(node?.linkedCampaignIds);
  const childIds = asList(node?.children).flatMap(campaignIdsForNode);
  return [...new Set([...ownIds, ...childIds])];
}

function linkedCampaigns(data, node) {
  return campaignIdsForNode(node)
    .map((campaignId) => data.campaigns.find((campaign) => campaign.id === campaignId))
    .filter(Boolean);
}

const REGION_SPLIT_NAMES = ["北美", "欧洲", "亚太", "日韩", "中国"];

function normaliseRegionSplit(regions = []) {
  return REGION_SPLIT_NAMES.map((name) => {
    const existing = asList(regions).find((region) => region.name === name);
    return existing || {
      name,
      target: "待设定",
      done: "待录入",
      progress: 0,
      status: "待补目标",
    };
  });
}

function withRegionSplit(finance) {
  return {
    ...finance,
    regions: normaliseRegionSplit(finance.regions),
  };
}

function clampPercent(value) {
  const number = Number(value);
  if (Number.isNaN(number)) return 0;
  return Math.max(0, Math.min(100, number));
}

function renderMetric(metric) {

      <strong>${escapeText(metric.value)}</strong>
      ${metric.note ? `<small>${escapeText(metric.note)}</small>` : ""}
    </article>
  `;
}

          <div class="finance-chart-head">

function uniqueValues(values) {
  return [...new Set(asList(values).flat().filter(Boolean))];
}

function campaignFirstLevelMetrics(campaign) {
  const configured = asList(campaign.firstLevelIndicators);
  if (configured.length) return configured;

  const owners = uniqueValues(asList(campaign.actionPlans).map((plan) => String(plan.owner || "").split("·").pop()?.trim())).slice(0, 3);
  const fallbackLabels = owners.length ? owners : ["红人", "广告", "社媒"];

  return [
    ...fallbackLabels.map((label) => ({
      label,
      value: "待拆解一级指标",
      note: "用于支撑上方 North Star，可在编辑 Brief 中调整。",

      label: "自定义指标",
      value: "待编辑",
      note: "点击编辑 Brief 后补充新的一级指标",
      addable: true,
    },
  ].slice(0, 4);
}

  const isProductRoot = node?.kind === "pillar" && node?.id === "tree-product";
  const visibleCampaigns = isProductRoot || isLine ? [] : campaigns;
  const finance = productFinance(node?.label);
  const baseMetrics = asList(context.metrics);

  return {
    mode: isProduct ? "product" : isLine ? "line" : "knowledge",
    nodeId: node?.id,
    nodeKind: node?.kind,
    nodeLabel: node?.label,
    eyebrow: isProduct ? "产品固化页 / Product Memory" : isLine ? "品线战略 / Line Strategy" : "固定科目 / Fixed Context",
    title: context.title || node?.label || selectedCampaign.name,
    subLabel: context.kindLabel || `${node?.label || "Context"} / ${node?.english || "Memory"}`,
    statusValue: context.statusValue || String(visibleCampaigns.length),
    statusLabel: context.statusLabel || "Campaign",
    summaryLabel: isProduct ? "产品长期判断" : "年度战略",
    summary: context.summary || node?.summary || "固定科目用于承接长期判断，下属 Campaign 只负责具体作战。",
    story: [
      { label: "固化了什么", value: context.summary || node?.summary || "长期战略、产品理解和可复用判断。" },
      { label: "为什么重要", value: context.importance || "避免每个 Campaign 都重新解释基础 Context。" },
      { label: "下一步", value: context.nextMove || (campaigns[0] ? `进入 ${campaigns[0].name} 查看作战记录。` : "等待挂载新的 Campaign。") },
    ],
    metrics: isProduct
      ? [
          { label: "今年已完成销额", value: finance.done, note: "mock data" },
          { label: "后续目标销额", value: finance.target, note: "年度目标牵引" },
          { label: "已投入预算", value: finance.spent, note: `费比 ${finance.ratio}` },
          { label: "剩余弹药", value: finance.ammo, note: "用于动态调配" },
        ]
      : baseMetrics.length
        ? baseMetrics
        : [
            { label: "关联 Campaign", value: `${visibleCampaigns.length} 个`, note: "来自当前目录树" },
            { label: "当前示例", value: selectedCampaign?.name || "待选择", note: "点击下属 Campaign 进入作战页" },
          ],
    finance: isProduct ? finance : null,
    sections: isProductRoot
      ? []
      : isProduct
      ? [
          {
            title: "产品固定页签",
            english: "Product Tabs",
            guidance: "这些信息跟随产品，不随 Campaign 更换。",
            items: [
              { label: "产品理解", value: context.summary || "待补充产品利益点和商业定义。" },
              { label: "用户洞察", value: context.importance || "待补充核心人群、场景和阻力。" },
              { label: "营销策略", value: context.nextMove || "从产品目标拆 Campaign 目标、预算和触达手段。" },
              { label: "Message House", value: baseMetrics[0]?.value || "待补充核心传递信息。" },
            ],

        ]

    campaigns: visibleCampaigns,
  };
}

/* src/components/CampaignKnowledgeTree.js */
function escapeText(value) {
  return String(value || "")
    .trim()
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function asList(value) {
  if (Array.isArray(value)) return value;
  return value ? [value] : [];
}

const PRODUCT_POSITIONING = {
  M2: "入门级激光",
  F2: "便携式激光",
  "F2 Ultra UV": "紫外万能雕刻",
  MetalFab: "激光焊&CNC",
  P3: "自动化 CO2",
  X1: "全能旗舰",
};

function campaignClassMeta(campaign) {
  if (campaign.productLine === "区域项目") {
    const regionLabels = {
      大促: { label: "大促", badge: "大促", tone: "promo" },
      节日: { label: "节日", badge: "节日", tone: "festival" },
      节点: { label: "节日", badge: "节日", tone: "festival" },
      "Always-on": { label: "Always-on", badge: "Always", tone: "always" },
      "Always on": { label: "Always on", badge: "Always", tone: "always" },
      场景: { label: "场景", badge: "场景", tone: "scenario" },
    };
    return regionLabels[campaign.type] || regionLabels[campaign.stage] || regionLabels[campaign.projectShort] || regionLabels["Always on"];
  }

  const key = campaign.campaignClass || (campaign.type === "新品上市" ? "launch" : campaign.type === "刷新" ? "refresh" : "sustaining");
  const labels = {
    launch: { label: "新品上市", badge: "Launch", english: "Launch", tone: "launch" },
    sustaining: { label: "持续增长", badge: "Sustaining", english: "Sustaining", tone: "sustaining" },
    refresh: { label: "刷新", badge: "Refresh", english: "Refresh", tone: "refresh" },
  };

  return labels[key] || labels.sustaining;
}

function findCampaign(data, campaignId) {
  return data.campaigns.find((campaign) => campaign.id === campaignId);
}

function campaignIdsForNode(node) {
  const ownIds = asList(node.linkedCampaignIds);
  const childIds = asList(node.children).flatMap(campaignIdsForNode);
  return [...new Set([...ownIds, ...childIds])];
}

function campaignsForNode(data, node) {
  return campaignIdsForNode(node)
    .map((campaignId) => findCampaign(data, campaignId))
    .filter(Boolean);
}

function firstLinkedCampaignId(data, node) {
  return campaignsForNode(data, node)[0]?.id || "";
}

function canContainCampaigns(node) {
  return ["product", "region-project", "brand-project"].includes(node.kind);
}

function hasVisibleBody(node) {
  return asList(node.children).length > 0 || canContainCampaigns(node);
}

function isNodeOpen(state, node, depth) {
  const override = state.directoryOpenNodes?.[node.id];
  if (typeof override === "boolean") return override;
  return depth <= 1 || campaignIdsForNode(node).length > 0;
}

function renderFilterSelect(id, label, options, value) {
  return `
    <label class="knowledge-filter">
      <span>${escapeText(label)}</span>
      <select data-filter="${escapeText(id)}" aria-label="${escapeText(label)}">
        ${options.map((option) => `<option value="${escapeText(option)}" ${option === value ? "selected" : ""}>${escapeText(option)}</option>`).join("")}
      </select>
    </label>
  `;
}

function renderFilterDock(data, state) {
  return `
    <section class="directory-filter-dock" aria-label="Campaign secondary filters">
      <div>
        <strong>辅助筛选 / Filters</strong>
        <span>临时缩小查看范围，不改变上方固定业务目录。</span>
      </div>
      <div class="directory-filter-grid">
        ${renderFilterSelect("productLine", "产品", data.filters.productLines, state.productLine)}
        ${renderFilterSelect("stage", "阶段", data.filters.stages, state.stage)}
        ${renderFilterSelect("region", "区域", data.filters.regions, state.region)}
        ${renderFilterSelect("functionName", "职能", data.filters.functions, state.functionName)}
      </div>
    </section>
  `;
}

function renderCampaignButton(campaign, selectedCampaignId, selectedKnowledgeId) {
  const classMeta = campaignClassMeta(campaign);
  const isActive = selectedKnowledgeId === `campaign:${campaign.id}` || campaign.id === selectedCampaignId;

  return `
    <button
      class="directory-campaign-row ${isActive ? "active" : ""}"
      type="button"
      data-campaign-id="${escapeText(campaign.id)}"
      data-campaign-knowledge-id="campaign:${escapeText(campaign.id)}"
      aria-pressed="${isActive ? "true" : "false"}"
    >
      <span class="campaign-class-badge class-${classMeta.tone}">${escapeText(classMeta.badge || classMeta.english)}</span>
      <span>
        <strong>${escapeText(campaign.name)}</strong>
        <small>${escapeText(classMeta.label)} · ${escapeText(campaign.timeframe)} · ${escapeText(campaign.coverage || campaign.region)}</small>
      </span>
    </button>
  `;
}

function renderNodeCampaigns(data, node, selectedCampaignId, selectedKnowledgeId) {
  if (!canContainCampaigns(node)) return "";

  const linkedCampaigns = asList(node.linkedCampaignIds)
    .map((campaignId) => findCampaign(data, campaignId))
    .filter(Boolean);

  if (!linkedCampaigns.length) {
    return `<div class="directory-empty-campaign">暂未挂 Campaign，后续可从这里归档。</div>`;
  }

  return `
    <div class="directory-campaign-list">
      ${linkedCampaigns.map((campaign) => renderCampaignButton(campaign, selectedCampaignId, selectedKnowledgeId)).join("")}
    </div>
  `;
}

function rootTitle(node) {
  const titles = {
    "tree-product": "产品类 Campaign",
    "tree-region": "区域类 Campaign",
    "tree-brand": "品牌及其他类 Campaign",
  };

  return titles[node.id] || node.label;
}

function renderKnowledgeNode(data, node, state, selectedCampaignId, depth = 0) {
  const children = asList(node.children);
  const linkedCampaigns = campaignsForNode(data, node);
  const linkedCampaignId = firstLinkedCampaignId(data, node);
  const isActive = state.selectedKnowledgeId === node.id;
  const isOpen = isNodeOpen(state, node, depth);
  const canToggle = hasVisibleBody(node);
  const childMarkup = children.map((child) => renderKnowledgeNode(data, child, state, selectedCampaignId, depth + 1)).join("");
  const title = depth === 0 ? rootTitle(node) : node.label;
  const nodeSummary = node.summary || node.context?.summary || node.english || "";
  const productPosition = node.kind === "product" ? PRODUCT_POSITIONING[node.label] || "" : "";
  const nodeSubtitle = node.kind === "product" ? productPosition : node.english || nodeSummary;
  const actionLabel = node.kind === "pillar" ? "管理" : "编辑";
  const action = node.kind === "pillar" ? "manage" : "edit";
  const markerText = node.shortLabel || node.label?.slice(0, 2) || "科目";
  const markerContent = markerText === "APAC" ? "AP<br>AC" : escapeText(markerText);

  return `
    <div class="directory-node depth-${depth} kind-${escapeText(node.kind)} ${isActive ? "active" : ""} ${isOpen ? "open" : "collapsed"} ${canToggle ? "" : "is-leaf"}" data-directory-node="${escapeText(node.id)}">
      <div class="directory-node-row">
        <button
          class="directory-node-toggle"
          type="button"
          data-directory-toggle="${escapeText(node.id)}"
          aria-label="${isOpen ? "折叠" : "展开"} ${escapeText(node.label)}"
          aria-expanded="${isOpen ? "true" : "false"}"
          ${canToggle ? "" : "disabled"}
        >
          <span class="directory-node-caret">›</span>
        </button>
        <button
          class="directory-node-button"
          type="button"
          data-knowledge-id="${escapeText(node.id)}"
          ${linkedCampaignId ? `data-knowledge-campaign-id="${escapeText(linkedCampaignId)}"` : ""}
          aria-pressed="${isActive ? "true" : "false"}"
        >
          <span class="directory-node-marker ${markerText === "APAC" ? "wrap-marker" : ""}">${markerContent}</span>
          <span class="directory-node-copy ${node.kind === "product" ? "product-copy" : ""}">
            <strong>${escapeText(title)}${productPosition ? `<small>${escapeText(productPosition)}</small>` : ""}</strong>
            ${node.kind !== "product" && nodeSubtitle ? `<small>${escapeText(nodeSubtitle)}</small>` : ""}
          </span>
          <em>${linkedCampaigns.length}</em>
        </button>
        <button
          class="directory-node-action ${escapeText(action)}"
          type="button"
          data-directory-action="${escapeText(action)}"
          data-directory-node-id="${escapeText(node.id)}"
          data-directory-node-kind="${escapeText(node.kind)}"
          data-directory-node-label="${escapeText(node.label)}"
          aria-label="${escapeText(actionLabel)} ${escapeText(node.label)}"
        >
          ${escapeText(actionLabel)}
        </button>
      </div>
      ${
        isOpen && canToggle
          ? `<div class="directory-node-body">
              ${renderNodeCampaigns(data, node, selectedCampaignId, state.selectedKnowledgeId)}
              ${childMarkup ? `<div class="directory-children">${childMarkup}</div>` : ""}
            </div>`
          : ""
      }
    </div>
  `;
}

function renderDirectorySummary(data) {
  const roots = asList(data.campaignKnowledgeTree);
  const productCount = campaignsForNode(data, roots[0] || {}).length;
  const regionCount = campaignsForNode(data, roots[1] || {}).length;
  const brandCount = campaignsForNode(data, roots[2] || {}).length;

  return `
    <div class="directory-summary-strip" aria-label="Campaign directory summary">
      <span><strong>${productCount}</strong><small>产品 Campaign</small></span>
      <span><strong>${regionCount}</strong><small>区域项目</small></span>
      <span><strong>${brandCount}</strong><small>品牌项目</small></span>
    </div>
  `;
}

function compactNodeLabel(node, depth) {
  if (node.shortLabel) return node.shortLabel;
  if (depth === 0) return node.label?.slice(0, 2) || "目";
  if (node.kind === "product") return node.label?.replace("F2 Ultra UV", "UV").replace("MetalFab", "MF") || "品";
  return node.label?.slice(0, 4) || "项";
}

function renderCompactNode(data, node, selectedKnowledgeId, depth = 0) {
  const children = asList(node.children);
  const linkedCampaignId = firstLinkedCampaignId(data, node);
  const isActive = selectedKnowledgeId === node.id;
  const count = campaignsForNode(data, node).length;

  return `
    <div class="knowledge-compact-node depth-${depth} kind-${escapeText(node.kind)}">
      <button
        class="knowledge-compact-button ${isActive ? "active" : ""}"
        type="button"
        data-knowledge-id="${escapeText(node.id)}"
        ${linkedCampaignId ? `data-knowledge-campaign-id="${escapeText(linkedCampaignId)}"` : ""}
        title="${escapeText(depth === 0 ? rootTitle(node) : node.label)}"
        aria-label="${escapeText(depth === 0 ? rootTitle(node) : node.label)}"
      >
        <strong>${escapeText(compactNodeLabel(node, depth))}</strong>
        ${count ? `<span>${count}</span>` : ""}
      </button>
      ${
        children.length
          ? `<div class="knowledge-compact-children">
              ${children.map((child) => renderCompactNode(data, child, selectedKnowledgeId, depth + 1)).join("")}
            </div>`
          : ""
      }
    </div>
  `;
}

function renderCompactTree(data, selectedKnowledgeId) {
  const roots = asList(data.campaignKnowledgeTree);

  return `
    <section class="campaign-list-panel compact campaign-directory compact" aria-label="Campaign directory compact tree">
      <button class="rail-toggle compact" type="button" data-campaign-rail-toggle aria-label="展开 Campaign 目录">展开</button>
      <div class="knowledge-compact-list">
        ${roots.map((node) => renderCompactNode(data, node, selectedKnowledgeId)).join("")}
      </div>
    </section>
  `;
}

function renderCampaignKnowledgeTree(data, state, selectedCampaignId) {
  if (state.campaignRailCollapsed) {
    return renderCompactTree(data, state.selectedKnowledgeId);
  }

  return `
    <section class="campaign-list-panel campaign-directory" aria-label="Campaign fixed business directory">
      <div class="rail-header directory-header">
        <div>
          <p class="ops-eyebrow">Campaign目录</p>
          <h2>业务科目树</h2>
          <small>先定位品线 / 产品 / 区域 / 品牌，再进入具体 Campaign。</small>
        </div>
        <div class="collection-actions">
          <button class="create-campaign-button directory-create-button" type="button" data-create-campaign-open aria-label="新建 Campaign">
            <span class="create-campaign-icon">+</span>
            <span>新建 Campaign</span>
          </button>
          <button class="rail-toggle" type="button" data-campaign-rail-toggle aria-label="折叠 Campaign 目录">折叠</button>
        </div>
      </div>
      ${renderDirectorySummary(data)}
      <div class="campaign-list-scroll directory-scroll">
        ${asList(data.campaignKnowledgeTree)
          .map((node) => renderKnowledgeNode(data, node, state, selectedCampaignId))
          .join("")}
      </div>
      ${renderFilterDock(data, state)}
    </section>
  `;
}



/* src/components/CampaignMemoryLedger.js */
function escapeText(value) {
  return String(value || "")
    .trim()
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function asList(value) {
  if (Array.isArray(value)) return value;
  return value ? [value] : [];
}

const METRICS = [
  {
    id: "traffic",
    label: "流量",
    english: "Traffic",
    aliases: ["流量", "Awareness", "曝光", "KOL", "PR", "红人", "社媒", "SEO"],
  },
  {
    id: "conversion",
    label: "转化率",
    english: "Conversion",
    aliases: ["转化率", "Consideration", "Conversion", "转化", "页面", "ROI", "Demo", "GTM"],
  },
  {
    id: "aov",
    label: "客单价",
    english: "AOV",
    aliases: ["客单价", "LTV", "复购", "AOV", "耗材", "升级", "套装"],
  },
];

const WORKFLOW_STEPS = [
  { key: "brief", label: "Brief", short: "Brief" },
  { key: "plan", label: "行动计划", short: "计划" },
  { key: "feedback", label: "信息反馈", short: "反馈" },
  { key: "context", label: "更新上下文", short: "写回" },
  { key: "todo", label: "下一步 To-do", short: "To-do" },
];

const JOURNEY_FILTERS = [
  { id: "Awareness", label: "Awareness" },
  { id: "Consideration", label: "Consideration" },
  { id: "Conversion", label: "Conversation" },
  { id: "Loyalty", label: "Loyalty" },
];
const MOCK_DATES = ["本周五", "下周三", "6月28日", "7月5日", "7月12日"];

function ownerName(value = "") {
  return String(value).split("·").map((part) => part.trim()).filter(Boolean).slice(-1)[0] || value || "待认领";
}

function textForPlan(plan) {
  return [
    ...asList(plan.objectives),
    ...asList(plan.journeyStages),
    ...asList(plan.functionCalls).map((call) => `${call.team} ${call.task}`),
    plan.planName,
    plan.title,
    plan.currentFlow,
    plan.type,
    plan.feedback,
    plan.nextTodo,
  ].join(" ");
}

function metricsForPlan(plan) {
  const text = textForPlan(plan);
  const metrics = METRICS.filter((metric) => metric.aliases.some((alias) => text.includes(alias)));
  return metrics.length ? metrics : [METRICS[1]];
}

function journeyTagsForPlan(plan) {
  const tags = asList(plan.journeyStages).filter(Boolean);
  if (tags.length) return tags.slice(0, 3);

  const text = textForPlan(plan);
  if (/复购|Loyalty|升级/.test(text)) return ["Loyalty"];
  if (/转化|ROI|Demo|页面|Conversion/.test(text)) return ["Conversion"];
  return ["Consideration"];
}

function progressForPlan(plan) {
  const text = [plan.status, plan.feedback, plan.contextUpdate, plan.archiveStatus, plan.nextTodo].join(" ");
  if (/停|风险|阻塞|不足|冲突/.test(text)) return 36;
  if (/写入|放大|完成|已/.test(text)) return 76;
  if (/执行|进行|测试|验证/.test(text)) return 58;
  return 28;
}

function toneForPlan(plan) {
  const text = [plan.status, plan.feedback, plan.contextUpdate, plan.archiveStatus].join(" ");
  if (/停|风险|阻塞|不足|冲突/.test(text)) return "risk";
  if (/写入|放大|完成|Playbook/.test(text)) return "done";
  if (/待|确认|启动/.test(text)) return "pending";
  return "active";
}

function stepContent(plan, key) {
  const values = {
    brief: plan.title || plan.description,
    plan: plan.experiment || asList(plan.functionCalls).map((call) => call.task).join(" / "),
    feedback: plan.feedback || plan.signal,
    todo: plan.nextTodo,
    context: plan.contextUpdate || plan.archiveStatus,
  };

  return values[key] || "待补充";
}

function stepState(plan, key) {
  const value = stepContent(plan, key);
  if (!value || value === "待补充") return "empty";
  if (key === "todo") return "active";
  if (toneForPlan(plan) === "risk" && ["feedback", "context"].includes(key)) return "risk";
  if (["todo", "context"].includes(key) && /待|等待|不足|草稿/.test(value)) return "active";
  if (/写入|完成|已|放大|确认/.test(value)) return "done";
  return "active";
}

function stepStateLabel(state, key) {
  const labelsByStep = {
    brief: { done: "已下发", active: "已下发", risk: "需重写", empty: "待下发" },
    plan: { done: "已成型", active: "进行中", risk: "有风险", empty: "待计划" },
    feedback: { done: "已反馈", active: "已反馈", risk: "有风险", empty: "待反馈" },
    context: { done: "已写回", active: "待判断", risk: "需判断", empty: "待写回" },
    todo: { done: "已完成", active: "待响应", risk: "需决策", empty: "待明确" },
  };
  const labels = labelsByStep[key] || {
    done: "已完成",
    active: "进行中",
    risk: "有风险",
    empty: "待补充",
  };

  return labels[state] || "进行中";
}

function buildTasks(campaign) {
  return asList(campaign.actionPlans).map((plan, index) => {
    const metrics = metricsForPlan(plan);
    const calls = asList(plan.functionCalls);

    return {
      id: `task:${plan.id}`,
      plan,
      index,
      metrics,
      journeyTags: journeyTagsForPlan(plan),
      progress: progressForPlan(plan),
      tone: toneForPlan(plan),
      functionRows: calls.length ? calls : [{ team: plan.owner?.split("·")[0]?.trim() || "PCT", task: plan.title, status: plan.status }],
      deadline: plan.deadline || plan.due || MOCK_DATES[index % MOCK_DATES.length],
    };
  });
}

function taskMatchesFilter(task, filterId) {
  if (!filterId || filterId === "all") return true;
  if (filterId.startsWith("journey:")) {
    const journey = filterId.replace("journey:", "");
    return task.journeyTags.includes(journey);
  }

  return task.metrics.some((metric) => metric.id === filterId);
}

function filterCount(tasks, filterId) {
  return tasks.filter((task) => taskMatchesFilter(task, filterId)).length;
}

function renderCampaignMemoryLedger(data, selectedCampaign, selectedKnowledge, selectedMetricId, selectedFunctionId, actionStatus) {

  if (!isCampaignContext) {
    return `

          </div>
        </div>
      </section>
    `;
  }

  const tasks = buildTasks(selectedCampaign);
  const selectedFilterId = selectedMetricId && selectedMetricId !== "all" ? selectedMetricId : null;
  const visibleTasks = tasks.filter((task) => taskMatchesFilter(task, selectedFilterId));
  const selectedTask =
    visibleTasks.find((task) => task.id === selectedFunctionId || selectedFunctionId?.includes(task.plan.id)) ||
    tasks.find((task) => task.id === selectedFunctionId || selectedFunctionId?.includes(task.plan.id));

  return `

      </div>

      <section class="operation-board-objective">
        <span>Elevator Pitch 电梯演讲</span>
        <p>${escapeText(elevatorPitchText(selectedCampaign))}</p>
      </section>

      ${renderTaskOverview(tasks, visibleTasks, selectedTask?.id, selectedFilterId, actionStatus)}
      ${renderCampaignHistory(selectedCampaign, tasks, actionStatus)}
      ${renderTaskCreateModal(actionStatus)}
    </section>
  `;
}



/* src/components/CreateCampaignModal.js */
function renderOptions(options, selectedValue = "") {
  return options
    .filter((option) => !option.startsWith("全部"))
    .map((option) => `<option value="${option}" ${option === selectedValue ? "selected" : ""}>${option}</option>`)
    .join("");
}

function asList(value) {
  if (Array.isArray(value)) return value;
  return value ? [value] : [];
}

function findNodeById(nodes, targetId) {
  for (const node of asList(nodes)) {
    if (node.id === targetId) return node;
    const childMatch = findNodeById(node.children, targetId);
    if (childMatch) return childMatch;
  }

  return null;
}

function flattenKnowledgeNodes(nodes, parentPath = []) {
  return asList(nodes).flatMap((node) => {
    const path = [...parentPath, node.label];
    return [
      { ...node, path },
      ...flattenKnowledgeNodes(node.children, path),
    ];
  });
}

function childNodes(node) {
  return asList(node?.children);
}

function defaultPillar(data) {
  return findNodeById(data.campaignKnowledgeTree, "tree-product") || asList(data.campaignKnowledgeTree)[0];
}

function defaultBranch(pillar) {
  return findNodeById([pillar], "line-laser") || childNodes(pillar)[0];
}

function defaultMountNode(branch) {
  return findNodeById([branch], "product-metalfab") || childNodes(branch)[0] || branch;
}

function renderKnowledgeOptions(nodes, selectedValue = "") {
  return asList(nodes)
    .map((node) => `<option value="${node.id}" ${node.id === selectedValue ? "selected" : ""}>${node.label}</option>`)
    .join("");
}

const productTypeOptions = [
  { value: "新品筹备", label: "新品筹备 / Pre-launch" },
  { value: "新品上市", label: "新品上市 / Launch" },
  { value: "持续增长", label: "持续增长 / Sustaining" },
  { value: "EOL", label: "EOL / 退市收尾" },
  { value: "其他", label: "其他 / 自定义" },
];

const regionTypeOptions = [
  { value: "大促", label: "大促 / Promo" },
  { value: "节日", label: "节日 / Seasonal" },
  { value: "场景", label: "场景 / Scenario" },
  { value: "Always on", label: "Always on / 长期项目" },
  { value: "其他", label: "其他 / 自定义" },
];

const brandTypeOptions = [
  { value: "品牌建设", label: "品牌建设 / Brand Building" },
  { value: "形象刷新", label: "形象刷新 / Refresh" },
  { value: "行业大会", label: "行业大会 / Event" },
  { value: "其他", label: "其他 / 自定义" },
];

function typeOptionsForPillar(pillar) {
  if (pillar?.id === "tree-region") return regionTypeOptions;
  if (pillar?.id === "tree-brand") return brandTypeOptions;
  return productTypeOptions;
}

function renderCampaignTypeOptions(options = productTypeOptions) {
  return options.map((option) => `<option value="${option.value}">${option.label}</option>`).join("");
}

function renderStageOptions(options = productTypeOptions) {
  return options
    .filter((option) => option.value !== "其他")
    .map((option, index) => `<option value="${option.value}" ${index === 0 ? "selected" : ""}>${option.label}</option>`)
    .join("");
}

function renderRegionChoices(options, selectedValues = ["全球"]) {
  const choices = options.filter((option) => !option.startsWith("全部"));

  return `
    <div class="campaign-region-picker" data-region-picker>
      <input type="hidden" name="region" value="${selectedValues.join("+")}" data-region-value />
      ${choices
        .map((option) => `
          <label class="campaign-region-choice ${selectedValues.includes(option) ? "selected" : ""}">
            <input type="checkbox" value="${option}" data-region-choice ${selectedValues.includes(option) ? "checked" : ""} />
            <span>${option}</span>
          </label>
        `)
        .join("")}
    </div>
  `;
}

function renderContextField({ name, label, placeholder, rows = 2, required = false }) {
  return `
    <label class="campaign-field context-slot">
      <span>${label}</span>
      <textarea name="${name}" rows="${rows}" ${required ? "required" : ""} placeholder="${placeholder}"></textarea>
    </label>
  `;
}

function renderContextGroup(title, guidance, fields) {
  return `

      <div class="campaign-context-group-head">

      </div>
      <div class="campaign-context-fields">

    </section>

}

function escapeHtml(value = "") {
  return String(value)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function compactList(items, fallback = "待补充", maxItems = 4) {
  const list = Array.isArray(items) ? items.filter(Boolean) : [items].filter(Boolean);
  if (!list.length) return fallback;
  const visible = list.slice(0, maxItems).join(" / ");
  return list.length > maxItems ? `${visible} +${list.length - maxItems}` : visible;
}

function formatNumber(value) {
  return new Intl.NumberFormat("en-US").format(Math.round(value));
}

function formatMoney(value) {
  if (value >= 1000000) return `$${(value / 1000000).toFixed(2)}M`;
  if (value >= 1000) return `$${(value / 1000).toFixed(1)}K`;
  return `$${formatNumber(value)}`;
}

function formatMillion(value, prefix = "$") {
  return `${prefix}${(value / 1000000).toFixed(2)}M`;
}

function formatRoi(value) {
  return `${Number.isFinite(value) ? value.toFixed(2) : "0.00"}x`;
}

function hashScore(seed = "") {
  return String(seed)
    .split("")
    .reduce((sum, char) => sum + char.charCodeAt(0), 0);
}

function isCampaignPage(activeNavId) {
  return activeNavId === "campaign-center";
}

function selectOptions(options, value) {
  return options.map((option) => `<option value="${escapeHtml(option)}" ${option === value ? "selected" : ""}>${escapeHtml(option)}</option>`).join("");
}

function campaignTimeScore(campaign) {
  const months = String(campaign.timeframe || "")
    .match(/\d+/g)
    ?.map(Number);
  return months?.length ? Math.max(...months) : 0;
}

function isRunningCampaign(campaign) {
  return !/EOL|已结束|归档|结束/.test(`${campaign.stage} ${campaign.status} ${campaign.type}`);
}

function sortedCampaignNames(campaigns) {
  return [...campaigns]
    .sort((a, b) => {
      const runningDelta = Number(isRunningCampaign(b)) - Number(isRunningCampaign(a));
      if (runningDelta) return runningDelta;
      return campaignTimeScore(b) - campaignTimeScore(a);
    })
    .map((campaign) => campaign.name);
}

function filterCampaigns(data, state) {
  return data.campaigns.filter((campaign) => {
    const scheduleCampaignMatch =
      state.activeNavId !== "schedule" || !state.calendarCampaign || state.calendarCampaign === "全部 Campaign" || campaign.name === state.calendarCampaign;
    const productMatch = ["全部产品", "全部产品线"].includes(state.productLine) || campaign.productLine === state.productLine;
    const regionMatch = state.region === "全部区域" || campaign.region === state.region || campaign.coverage?.includes(state.region);
    const stageMatch = state.stage === "全部阶段" || campaign.stage === state.stage;
    const functionMatch = state.functionName === "全部职能" || campaign.functions.includes(state.functionName);
    return scheduleCampaignMatch && productMatch && regionMatch && stageMatch && functionMatch;
  });
}

function renderWorkspaceFilters(data, state, includeCampaign = false, campaignSelectKey = "dashboardCampaign") {
  const campaigns = ["全部 Campaign", ...sortedCampaignNames(data.campaigns)];
  const campaignFilter = includeCampaign
    ? `<label>
        <span>Campaign</span>
        <select data-workspace-select="${campaignSelectKey}">${selectOptions(campaigns, state[campaignSelectKey] || "全部 Campaign")}</select>

      </label>

        <select data-filter="functionName">${selectOptions(data.filters.functions, state.functionName)}</select>
      </label>
      </div>
    </section>
  `;
}

function deriveTasks(data, state) {
  return filterCampaigns(data, state)
    .flatMap((campaign, campaignIndex) =>
      (campaign.actionPlans || []).map((plan, planIndex) => {
        const needsApproval = /判断|确认|待/.test(`${plan.status} ${plan.nextTodo} ${plan.contextUpdate}`);
        const waitingFeedback = /回传|反馈|信号/.test(`${plan.status} ${plan.feedback} ${plan.signal}`);
        const status = needsApproval ? "待审批" : waitingFeedback ? "待反馈" : /执行|进行/.test(plan.status) ? "待执行" : "待认领";
        const priority = plan.tone === "warning" || campaign.priority?.level === "S" ? "P0" : planIndex < 2 ? "P1" : "P2";
        const day = 8 + campaignIndex * 5 + planIndex * 3;
        return {
          id: `${campaign.id}:${plan.id}`,
          priority,
          status,
          campaign,
          plan,
          ddl: `6.${String(day).padStart(2, "0")}`,
          owner: plan.owner || campaign.owner,
          next: plan.nextTodo || plan.contextUpdate || "等待 Owner 补充下一步。",
        };
      }),
    )
    .slice(0, 18);
}

function renderTaskSummary(tasks, state) {

    ["进行中", tasks.filter((task) => task.status === "待执行").length, "info"],
    ["待反馈", tasks.filter((task) => task.status === "待反馈").length, "success"],
    ["待审批", tasks.filter((task) => task.status === "待审批").length, "danger"],
  ];

          ([label, value, tone]) => `

}

function calendarMeta(state) {
  const offset = Number(state.calendarMonthOffset || 0);
  const date = new Date(BASE_CALENDAR_YEAR, BASE_CALENDAR_MONTH + offset, 1);
  const year = date.getFullYear();
  const month = date.getMonth();
  const monthLabel = `${year} 年 ${month + 1} 月`;
  const days = new Date(year, month + 1, 0).getDate();
  const firstDay = new Date(year, month, 1).getDay();
  const mondayOffset = (firstDay + 6) % 7;

  return { year, month, monthLabel, days, mondayOffset, offset };
}

function shiftDay(day, meta, seed = 0) {
  if (meta.offset === 0) return Math.min(day, meta.days);
  const shifted = ((day + meta.offset * 4 + seed) % meta.days) + 1;
  return shifted > 0 ? shifted : day;
}

function objectiveLabel(plan, fallback = "节奏") {
  return compactList(plan?.objectives || fallback, fallback, 1);
}

function calendarObjectiveLabel(plan, fallbackIndex = 0) {
  const fallbackOptions = ["流量", "转化率", "客单价"];
  const values = Array.isArray(plan?.objectives) ? plan.objectives : [];
  const allowed = values.filter((item) => /流量|转化率|客单价/.test(item));
  return allowed.length ? compactList(allowed, allowed[0], 2) : fallbackOptions[fallbackIndex % fallbackOptions.length];
}

function eventTouchesDay(event, day) {
  return event.startDay <= day && event.endDay >= day;
}

function objectiveTone(value) {
  if (/流量|曝光/.test(value)) return "traffic";
  if (/转化|ROI/.test(value)) return "conversion";
  if (/客单价|复购|Loyalty/i.test(value)) return "value";
  if (/节奏|节点/.test(value)) return "rhythm";
  return "general";
}

function journeyTone(value) {
  const label = String(value || "").toLowerCase();
  if (label.includes("awareness")) return "awareness";
  if (label.includes("consideration")) return "consideration";
  if (label.includes("conversion")) return "conversion";
  if (label.includes("loyalty")) return "loyalty";
  return "general";
}

function regionTone(value = "") {
  if (String(value).includes("北美")) return "north-america";
  if (String(value).includes("欧洲")) return "europe";
  if (String(value).includes("亚太")) return "apac";
  if (String(value).includes("日韩")) return "japan-korea";
  if (String(value).includes("中国")) return "china";
  return "global";
}

function calendarCampaignLabel(campaign) {
  const product = campaign?.productShort || campaign?.productLine || "Campaign";
  const compactName = String(campaign?.name || "")
    .replace(/^xTool\s*/i, "")
    .replace(new RegExp(`^${product}\\s*`, "i"), "")
    .replace(/Q\d\s*/i, "")
    .replace(/增长$/, "")
    .trim();

  return [product, compactName || campaign?.projectShort || campaign?.displayStage || campaign?.stage]
    .filter(Boolean)
    .join(" · ");
}

function calendarCampaignLegendLabel(campaign) {
  return `${campaign?.productShort || campaign?.productLine || "Campaign"} · ${campaign?.name || "未命名 Campaign"}`;
}

function calendarCampaignTone(data, campaign) {
  const index = (data.campaigns || []).findIndex((item) => item.id === campaign?.id);
  return ((index >= 0 ? index : hashScore(campaign?.id || campaign?.name || "")) % 4) + 1;
}

function campaignRegions(campaign) {
  const values = [
    campaign?.regionShort,
    campaign?.region,
    ...(String(campaign?.coverage || "")
      .split(/[+\/,，、\s]+/g)
      .filter(Boolean)),
  ].filter(Boolean);

  return [...new Set(values)].length ? [...new Set(values)] : ["全球"];
}

function calendarEventRegion(campaign, index) {
  const regions = campaignRegions(campaign);
  return regions[index % regions.length] || "全球";
}

function calendarImportance(event, focusModel) {
  if (focusModel?.focusedEventIds?.has(event.id)) return "strong";
  if (event.risk === "high") return "strong";
  if (event.campaign?.priority?.level === "S" && event.type !== "阶段") return "medium";
  return "weak";
}

function dayRangeLabel(days) {
  if (!days?.length) return "暂无可定位日期";
  const sorted = [...days].sort((a, b) => a - b);
  const first = sorted[0];
  const last = sorted[sorted.length - 1];
  return first === last ? `6.${first}` : `6.${first} - 6.${last}`;
}

function findLongestEmptyDayRange(events, meta) {
  const ranges = [];
  let current = [];

  for (let day = 1; day <= meta.days; day += 1) {
    const hasEvent = events.some((event) => eventTouchesDay(event, day));
    if (!hasEvent) {
      current.push(day);
    } else if (current.length) {
      ranges.push(current);
      current = [];
    }
  }

  if (current.length) ranges.push(current);
  return ranges.sort((a, b) => b.length - a.length)[0] || [];
}

function buildCalendarFocusModel(events, campaigns, state, meta) {
  const dayCounts = Array.from({ length: meta.days }, (_, index) => {
    const day = index + 1;
    return {
      day,
      count: events.filter((event) => eventTouchesDay(event, day)).length,
    };
  });
  const conflictDay = dayCounts.sort((a, b) => b.count - a.count)[0];
  const conflictEvents = conflictDay?.count > 1 ? events.filter((event) => eventTouchesDay(event, conflictDay.day)) : [];
  const coveredRegions = new Set(campaigns.flatMap((campaign) => [campaign.region, campaign.coverage].filter(Boolean)));
  const selectedRegion = state.region !== "全部区域" ? state.region : "";
  const missingRegion = selectedRegion || ["北美", "欧洲", "亚太", "中国"].find((region) => !Array.from(coveredRegions).some((item) => item.includes(region))) || "暂无明显空窗";
  const emptyDays = findLongestEmptyDayRange(events, meta);
  const coverageValue =
    missingRegion === "暂无明显空窗"
      ? missingRegion
      : emptyDays.length
        ? `${selectedRegion ? "当前区域" : missingRegion} ${dayRangeLabel(emptyDays)} 无排期`
        : `${selectedRegion || missingRegion} 暂无明显空窗`;
  const firstCampaign = campaigns[0];
  const synergyEvents = events
    .filter((event) => event.campaign.id === firstCampaign?.id || event.journey === "Awareness" || /KOL|广告|社群|Atomm/.test(event.functionName))
    .slice(0, 4);
  const focusItems = [
    {
      type: "conflict",
      label: "资源冲突",
      value: conflictEvents.length ? `${dayRangeLabel([conflictDay.day])} 有 ${conflictEvents.length} 条排期重叠` : "暂无冲突",
      hint: "点击后高亮重叠日期和相关排期，先看 Owner 是否重复。",
      eventIds: conflictEvents.map((event) => event.id),
      days: conflictDay?.count > 1 ? [conflictDay.day] : [],
    },
    {
      type: "coverage",
      label: "覆盖缺口",
      value: coverageValue,
      hint: emptyDays.length ? "点击后标出空窗日期区间，地域只做轻标签，不额外上地图。" : "目标市场没有动作时，补 Brief 或调区域资源。",
      eventIds: [],
      days: emptyDays,
    },
    {
      type: "synergy",
      label: "联动机会",
      value: `${firstCampaign?.productLine || "Campaign"} 内容可复用`,
      hint: "点击后高亮可复用素材、口径和节奏的横向排期。",
      eventIds: synergyEvents.map((event) => event.id),
      days: [...new Set(synergyEvents.flatMap((event) => Array.from({ length: event.endDay - event.startDay + 1 }, (_, index) => event.startDay + index)))],
    },
  ];
  const activeType = state.calendarFocus || focusItems[0]?.type || "conflict";
  const activeItem = focusItems.find((item) => item.type === activeType) || focusItems[0];

  return {
    activeType,
    activeItem,
    focusItems,
    selectedEventId: state.calendarSelectedEventId,
    focusedDays: new Set(activeItem?.days || []),
    focusedEventIds: new Set(activeItem?.eventIds || []),
  };
}

function getDefaultCalendarEventId(events, meta) {
  if (!events.length) return null;

  const now = new Date();
  const isCurrentMonth = now.getFullYear() === meta.year && now.getMonth() === meta.month;
  const referenceDay = isCurrentMonth ? now.getDate() : 1;
  const currentEvents = events
    .filter((event) => eventTouchesDay(event, referenceDay))
    .sort((eventA, eventB) => eventB.startDay - eventA.startDay || eventB.endDay - eventA.endDay);
  const upcomingEvent = events
    .filter((event) => event.startDay >= referenceDay)
    .sort((eventA, eventB) => eventA.startDay - eventB.startDay || eventB.endDay - eventA.endDay)[0];

  return currentEvents[0]?.id || upcomingEvent?.id || events[0].id;
}
