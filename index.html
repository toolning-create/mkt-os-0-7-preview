function deriveCalendarEvents(data, state, meta) {
  return filterCampaigns(data, state).flatMap((campaign, campaignIndex) => {
    const campaignTone = calendarCampaignTone(data, campaign);
    const phaseEvents = (campaign.phaseTimeline || []).map((phase, index) => {
      const startDay = shiftDay(3 + campaignIndex * 3 + index * 7, meta, index);
      const duration = 6 + (index % 2) * 3;
      return {
        id: `${campaign.id}:phase:${index}`,
        startDay,
        endDay: Math.min(meta.days, startDay + duration - 1),
        title: phase.name,
        campaign,
        campaignLabel: calendarCampaignLabel(campaign),
        campaignLegendLabel: calendarCampaignLegendLabel(campaign),
        campaignTone,
        functionName: phase.owner?.split("·")[0]?.split("/")[0]?.trim() || "PCT",
        owner: phase.owner || campaign.owner,
        region: calendarEventRegion(campaign, index),
        regionTone: regionTone(calendarEventRegion(campaign, index)),
        stage: campaign.stage,
        journey: ACTION_STAGE_LABELS[index % ACTION_STAGE_LABELS.length],
        objective: calendarObjectiveLabel(null, index),
        risk: index === 0 && campaign.urgency === "high" ? "medium" : "low",
        detail: phase.goal || phase.checkpoint || campaign.summary,
        type: "阶段",
        plan: null,
      };
    });
    const actionEvents = (campaign.actionPlans || []).slice(0, 4).map((plan, index) => {
      const startDay = shiftDay(5 + campaignIndex * 4 + index * 5, meta, index + campaignIndex);
      const duration = 4 + (index % 3) * 2;
      return {
        id: `${campaign.id}:action:${plan.id}`,
        startDay,
        endDay: Math.min(meta.days, startDay + duration - 1),
        title: plan.planName,
        campaign,
        campaignLabel: calendarCampaignLabel(campaign),
        campaignLegendLabel: calendarCampaignLegendLabel(campaign),
        campaignTone,
        functionName: plan.functionCalls?.[0]?.team || plan.owner?.split("·")[0] || "PCT",
        owner: plan.owner || campaign.owner,
        region: calendarEventRegion(campaign, index + 1),
        regionTone: regionTone(calendarEventRegion(campaign, index + 1)),
        stage: campaign.stage,
        journey: plan.journeyStages?.[0] || "Consideration",
        objective: calendarObjectiveLabel(plan, index),
        risk: plan.tone === "warning" || campaign.priority?.level === "S" && index < 2 ? "high" : "low",
        detail: plan.nextTodo || plan.contextUpdate || plan.feedback || campaign.summary,
        type: plan.type,
        plan,
      };
    });
    return [...phaseEvents, ...actionEvents];
  });
}

function renderCalendarGrid(events, meta, focusModel) {
  const cells = [
    ...Array.from({ length: meta.mondayOffset }, (_, index) => ({ type: "blank", id: `blank-${index}` })),
    ...Array.from({ length: meta.days }, (_, index) => ({ type: "day", day: index + 1 })),
  ];
  const paddedCells = [...cells];
  while (paddedCells.length % 7) {
    paddedCells.push({ type: "blank", id: `tail-${paddedCells.length}` });
  }
  const weeks = Array.from({ length: paddedCells.length / 7 }, (_, index) => paddedCells.slice(index * 7, index * 7 + 7));

  return `
    <div class="marketing-calendar-timeline" aria-label="${meta.monthLabel} 营销日历">
      <div class="calendar-weekday-row">
        ${["一", "二", "三", "四", "五", "六", "日"].map((day) => `<strong>${day}</strong>`).join("")}
      </div>
      ${weeks
        .map((week, weekIndex) => {
          const weekDays = week.filter((cell) => cell.type === "day").map((cell) => cell.day);
          const weekStart = Math.min(...weekDays);
          const weekEnd = Math.max(...weekDays);
          const weekEvents = Number.isFinite(weekStart)
            ? events.filter((event) => event.startDay <= weekEnd && event.endDay >= weekStart)
            : [];

          return `
            <section class="calendar-week-row" aria-label="第 ${weekIndex + 1} 周">
              <div class="calendar-date-row">
                ${week
                  .map((cell) => {
                    if (cell.type === "blank") return `<span class="calendar-date-cell blank"></span>`;
                    const isFocused = focusModel.focusedDays.has(cell.day);
                    return `<span class="calendar-date-cell ${isFocused ? "is-focus-day" : ""}">${cell.day}</span>`;
                  })
                  .join("")}
              </div>
              <div class="calendar-week-bars">
                ${weekEvents
                  .map((event) => {
                    const startDay = Math.max(event.startDay, weekStart);
                    const endDay = Math.min(event.endDay, weekEnd);
                    const startColumn = week.findIndex((cell) => cell.type === "day" && cell.day === startDay) + 1;
                    const span = endDay - startDay + 1;
                    const isFocused = focusModel.focusedEventIds.has(event.id);
                    const isSelected = focusModel.selectedEventId === event.id;
                    const isMuted = focusModel.focusedEventIds.size && !isFocused && focusModel.activeType !== "coverage";
                    const importance = calendarImportance(event, focusModel);
                    return `
                      <button
                        class="calendar-timeline-bar campaign-tone-${event.campaignTone} region-tone-${event.regionTone} importance-${importance} stage-${journeyTone(event.journey)} objective-${objectiveTone(event.objective)} ${isFocused ? "is-focused" : ""} ${isSelected ? "is-selected" : ""} ${isMuted ? "is-muted" : ""}"
                        type="button"
                        style="grid-column: ${startColumn} / span ${span};"
                        data-calendar-event="${escapeHtml(event.id)}"
                      >
                        <span class="calendar-bar-meta">
                          <b>${escapeHtml(event.campaignLabel)}</b>
                          <b>${escapeHtml(event.region)}</b>
                          <b>${escapeHtml(event.functionName)}</b>
                        </span>
                        <strong>${escapeHtml(event.title)}</strong>
                        <small class="calendar-bar-expanded">
                          <i class="objective-tag">${escapeHtml(event.objective)}</i>
                          <i class="journey-tag">${escapeHtml(event.journey)}</i>
                          <i class="owner-tag">${escapeHtml(event.owner)}</i>
                        </small>
                      </button>
                    `;
                  })
                  .join("")}
              </div>
            </section>
          `;
        })
        .join("")}
    </div>
  `;
}

function dashboardFunctionName(plan, campaign) {
  return plan.functionCalls?.[0]?.team || plan.owner?.split("·")[0]?.trim() || campaign.functions?.[0] || "PCT";
}

function dashboardDecisionTone(decision) {
  return DASHBOARD_DECISION_TONES[decision] || "hold";
}

function dashboardRowDecision({ roi, gap, tone }) {
  if (roi < 3.55) return "转移资源";
  if (tone === "warning" || gap !== "可放大") return "补证据";
  if (roi >= 4.45) return "加码";
  return "维持";
}

function dashboardGroupDecision({ count, roi, spendShare, revenueShare, riskCount, averageRoi }) {
  if (!count) return "维持";
  if (riskCount >= Math.ceil(count * 0.6)) return "补证据";
  if (roi >= averageRoi * 1.08 || revenueShare >= spendShare * 1.12) return "加码";
  if (roi <= averageRoi * 0.9 || revenueShare <= spendShare * 0.86) return "转移资源";
  return "维持";
}

function dashboardDecisionReason(decision, label, metrics) {
  if (decision === "加码") return `${label} 的产出占比高于投入占比，ROI ${formatRoi(metrics.roi)}，适合优先追加资源。`;
  if (decision === "转移资源") return `${label} 当前投入占比高于产出占比，ROI ${formatRoi(metrics.roi)}，建议把资源转给更高 ROI 的对象。`;
  if (decision === "补证据") return `${label} 还有 ${metrics.riskCount} 个缺口节点，先补转化、评论或 ROI 证据，再判断是否加码。`;
  return `${label} 投入和产出基本匹配，保持节奏并继续观察下一轮信号。`;
}

function dashboardNextMove(decision, label, row) {
  const owner = row?.owner || row?.campaign?.owner || "Owner";
  if (decision === "加码") return `${owner} 先确认 ${label} 的放大边界，再决定追加预算或人力。`;
  if (decision === "转移资源") return `暂停给 ${label} 追加资源，优先比较是否转给更高 ROI 节点。`;
  if (decision === "补证据") return `${owner} 先补 ${label} 的转化证据、评论信号或 ROI 口径。`;
  return `${owner} 维持当前节奏，下一轮只看转化和销量是否继续稳定。`;
}

function dashboardTotals(rows) {
  const spent = rows.reduce((sum, row) => sum + row.spent, 0);
  const sales = rows.reduce((sum, row) => sum + row.sales, 0);
  const impressions = rows.reduce((sum, row) => sum + row.impressions, 0);
  const units = rows.reduce((sum, row) => sum + row.units, 0);
  return {
    spent,
    sales,
    impressions,
    units,
    roi: spent ? sales / spent : 0,
  };
}

function funnelStageTone(stage = "Consideration") {
  const normalized = ACTION_STAGE_LABELS.find((label) => label === stage) || "Consideration";
  return FUNNEL_STAGE_META[normalized]?.tone || "consideration";
}

function funnelStageDisplay(stage = "Consideration") {
  const normalized = ACTION_STAGE_LABELS.find((label) => label === stage) || "Consideration";
  const meta = FUNNEL_STAGE_META[normalized];
  return meta ? `${meta.label} ${meta.cn}` : stage;
}

function findCampaignTreePath(nodes = [], campaignId, path = []) {
  for (const node of nodes) {
    const nextPath = [...path, node];
    if (node.linkedCampaignIds?.includes(campaignId)) return nextPath;
    const childPath = findCampaignTreePath(node.children || [], campaignId, nextPath);
    if (childPath) return childPath;
  }
  return null;
}

function campaignTaxonomy(data, campaign) {
  const path = findCampaignTreePath(data.campaignKnowledgeTree || [], campaign.id);
  const rootNode = path?.[0];
  const leafNode = path?.[path.length - 1];
  const rootLabel = rootNode ? `${rootNode.english || rootNode.label} / ${rootNode.label}` : "Product / 产品";
  const rootKey = rootNode?.id || "tree-product";

  if (rootKey === "tree-product") {
    const lineNode = path?.find((node) => node.kind === "product-line");
    const productNode = path?.find((node) => node.kind === "product");
    return {
      rootKey,
      rootLabel,
      lineKey: lineNode?.id || `line:${campaign.productLine}`,
      lineLabel: lineNode ? `${lineNode.english || lineNode.label} / ${lineNode.label}` : campaign.productLine,
      productKey: productNode?.id || `product:${campaign.productLine}`,
      productLabel: productNode ? productNode.label : campaign.productLine,
      campaignKey: campaign.id,
      campaignLabel: campaign.name,
    };
  }

  if (rootKey === "tree-region") {
    return {
      rootKey,
      rootLabel,
      lineKey: leafNode?.id || `region:${campaign.region}`,
      lineLabel: leafNode ? `${leafNode.english || leafNode.label} / ${leafNode.label}` : campaign.region,
      productKey: `region-project:${campaign.projectShort || campaign.type}`,
      productLabel: `${campaign.projectShort || campaign.type} / ${campaign.type}`,
      campaignKey: campaign.id,
      campaignLabel: campaign.name,
    };
  }

  if (rootKey === "tree-brand") {
    return {
      rootKey,
      rootLabel,
      lineKey: leafNode?.id || `brand:${campaign.productShort}`,
      lineLabel: leafNode ? `${leafNode.english || leafNode.label} / ${leafNode.label}` : campaign.productShort,
      productKey: `brand-project:${campaign.productShort || campaign.type}`,
      productLabel: `${campaign.productShort || "Brand"} / ${campaign.type}`,
      campaignKey: campaign.id,
      campaignLabel: campaign.name,
    };
  }

  return {
    rootKey,
    rootLabel,
    lineKey: `line:${campaign.productLine}`,
    lineLabel: campaign.productLine,
    productKey: `product:${campaign.productShort || campaign.productLine}`,
    productLabel: campaign.productShort || campaign.productLine,
    campaignKey: campaign.id,
    campaignLabel: campaign.name,
  };
}

function deriveDashboardRows(data, state) {
  const selectedName = state.dashboardCampaign || "全部 Campaign";
  const campaigns = filterCampaigns(data, state).filter((campaign) => selectedName === "全部 Campaign" || campaign.name === selectedName);
  return campaigns.flatMap((campaign, campaignIndex) =>
    (campaign.actionPlans || []).map((plan, planIndex) => {
      const base = 90000 + hashScore(plan.id) * 130 + campaignIndex * 28000 + planIndex * 12000;
      const spent = Math.round(base * (0.48 + (planIndex % 4) * 0.12));
      const planned = Math.round(base * 1.18);
      const available = Math.max(planned - spent, 0);
      const score = Math.min(96, 58 + (hashScore(plan.title) % 38));
      const sales = Math.round(spent * (3.2 + (score % 18) / 10));
      const units = Math.max(1, Math.round(sales / (260 + (score % 24) * 10)));
      const sentiment = Math.min(96, Math.max(42, 58 + (score % 31) - (plan.tone === "warning" ? 12 : 0)));
      const stage = plan.journeyStages?.[0] || "Consideration";
      const gap = plan.tone === "warning" ? "需补判断" : plan.tone === "success" ? "可放大" : "待信号";
      const roi = spent ? sales / spent : 0;
      const functionName = dashboardFunctionName(plan, campaign);
      const decision = dashboardRowDecision({ roi, gap, tone: plan.tone });
      const taxonomy = campaignTaxonomy(data, campaign);
      return {
        id: `${campaign.id}:${plan.id}`,
        campaign,
        plan,
        stage,
        stageTone: funnelStageTone(stage),
        stageLabel: funnelStageDisplay(stage),
        taxonomy,
        functionName,
        owner: plan.owner || campaign.owner,
        expected: plan.objectives?.includes("流量") ? "曝光 +30%" : plan.objectives?.includes("客单价") ? "客单价提升" : "转化提升",
        actual: plan.tone === "success" ? "超过预期" : plan.tone === "warning" ? "有缺口" : "观察中",
        gap,
        spent,
        planned,
        available,
        impressions: 1200000 + hashScore(plan.title) * 1000,
        conversion: `${(2.2 + (hashScore(plan.id) % 34) / 10).toFixed(1)}%`,
        ctr: `${(0.8 + (hashScore(plan.title) % 22) / 10).toFixed(1)}%`,
        sales,
        units,
        sentiment,
        score,
        roi,
        decision,
        decisionReason: dashboardDecisionReason(decision, plan.planName || plan.title, { roi, riskCount: gap === "可放大" ? 0 : 1 }),
      };
    }),
  );
}

function dashboardActionEfficiency(row, averageRoi) {
  if (row.plan.tone === "success" || row.roi >= averageRoi * 1.16) {
    return {
      label: "超预期",
      tone: "exceed",
      reason: "当前动作已经明显跑赢同筛选范围平均表现，适合先判断是否能复制或放大。",
    };
  }
  if (row.roi >= averageRoi * 1.04) {
    return {
      label: "高效",
      tone: "boost",
      reason: "当前动作投入产出高于同筛选范围平均值，可以优先看是否具备继续推进条件。",
    };
  }
  if (row.plan.tone === "warning" || row.roi <= averageRoi * 0.9) {
    return {
      label: "低效",
      tone: "shift",
      reason: "当前动作低于同筛选范围平均表现，先补证据或比较是否需要转移资源。",
    };
  }
  return {
    label: "正常",
    tone: "hold",
    reason: "当前动作在正常区间，保持节奏并继续观察下一轮信号。",
  };
}

function buildRoiDecisionItems(rows) {
  const totals = dashboardTotals(rows);
  const averageRoi = totals.roi || 1;

  return rows
    .map((row) => {
      const efficiency = dashboardActionEfficiency(row, averageRoi);
      return {
        key: `action:${row.id}`,
        name: row.plan.planName || row.plan.title,
        campaignName: row.campaign.name,
        meta: `${row.campaign.productLine} · ${row.campaign.region} · ${row.functionName}`,
        owner: row.owner,
        stage: row.stage,
        objectives: compactList(row.plan.objectives, "目标"),
        journey: compactList(row.plan.journeyStages, row.stage),
        spent: row.spent,
        sales: row.sales,
        units: row.units,
        impressions: row.impressions,
        roi: row.roi,
        stageTone: row.stageTone,
        stageLabel: row.stageLabel,
        taxonomy: row.taxonomy,
        efficiency,
        nextMove: row.plan.nextTodo || dashboardNextMove(row.decision, row.plan.planName || row.plan.title, row),
        row,
      };
    })
    .sort((a, b) => {
      const toneRank = { exceed: 0, boost: 1, hold: 2, shift: 3 };
      const rankDelta = (toneRank[a.efficiency.tone] ?? 4) - (toneRank[b.efficiency.tone] ?? 4);
      if (rankDelta) return rankDelta;
      return b.spent - a.spent;
    });
}

function dashboardPercent(value, max, min = 0, maxPercent = 100) {
  if (!Number.isFinite(value) || !Number.isFinite(max) || max <= 0) return min;
  return Math.max(min, Math.min(maxPercent, Math.round((value / max) * maxPercent)));
}

function dashboardRangePercent(value, minValue, maxValue, min = 12, max = 88) {
  if (!Number.isFinite(value) || !Number.isFinite(minValue) || !Number.isFinite(maxValue) || maxValue <= minValue) {
    return Math.round((min + max) / 2);
  }
  const raw = (value - minValue) / (maxValue - minValue);
  return Math.round(min + raw * (max - min));
}

function renderRoiVisualSummary(items) {
  const totals = items.reduce(
    (sum, item) => ({
      spent: sum.spent + item.spent,
      sales: sum.sales + item.sales,
      impressions: sum.impressions + item.impressions,
      units: sum.units + item.units,
    }),
    { spent: 0, sales: 0, impressions: 0, units: 0 },
  );
  const averageRoi = totals.spent ? totals.sales / totals.spent : 0;
  const bestRoi = [...items].sort((a, b) => b.roi - a.roi)[0];
  const revenueLead = [...items].sort((a, b) => b.sales - a.sales)[0];
  const spendLead = [...items].sort((a, b) => b.spent - a.spent)[0];
  const signalGaps = items.filter((item) => ["shift", "hold"].includes(item.efficiency.tone)).length;
  const maxSales = Math.max(...items.map((item) => item.sales), 1);
  const maxSpend = Math.max(...items.map((item) => item.spent), 1);

  return `
    <div class="roi-visual-summary">
      ${renderRoiInsightCard("Best ROI / 最高回报", bestRoi ? formatRoi(bestRoi.roi) : "0.00x", bestRoi ? bestRoi.name : "暂无动作", "boost", bestRoi ? dashboardPercent(bestRoi.roi, Math.max(...items.map((item) => item.roi), 1)) : 0)}
      ${renderRoiInsightCard("Revenue Lead / 销额领先", revenueLead ? formatMillion(revenueLead.sales) : "$0.00M", revenueLead ? revenueLead.name : "暂无动作", "exceed", revenueLead ? dashboardPercent(revenueLead.sales, maxSales) : 0)}
      ${renderRoiInsightCard("Spend Focus / 支出关注", spendLead ? formatMillion(spendLead.spent) : "$0.00M", spendLead ? spendLead.name : "暂无动作", "shift", spendLead ? dashboardPercent(spendLead.spent, maxSpend) : 0)}
      ${renderRoiInsightCard("Avg ROI / 平均效率", formatRoi(averageRoi), `${signalGaps} 条动作需要继续补证据或观察`, "hold", dashboardPercent(averageRoi, Math.max(...items.map((item) => item.roi), 1)))}
    </div>
  `;
}

function getNestedRoiGroup(map, key, label, extra = {}) {
  if (!map.has(key)) {
    map.set(key, {
      key,
      label,
      itemCount: 0,
      children: new Map(),
      items: [],
      ...extra,
    });
  }
  return map.get(key);
}

function groupRoiItemsByTaxonomy(items) {
  const rootMap = new Map();
  items.forEach((item) => {
    const taxonomy = item.taxonomy || {};
    const root = getNestedRoiGroup(rootMap, taxonomy.rootKey || "tree-product", taxonomy.rootLabel || "Product / 产品");
    const line = getNestedRoiGroup(root.children, taxonomy.lineKey || "line:unknown", taxonomy.lineLabel || "未归类品线");
    const product = getNestedRoiGroup(line.children, taxonomy.productKey || "product:unknown", taxonomy.productLabel || "未归类产品");
    const campaign = getNestedRoiGroup(product.children, taxonomy.campaignKey || item.campaignName, taxonomy.campaignLabel || item.campaignName);
    root.itemCount += 1;
    line.itemCount += 1;
    product.itemCount += 1;
    campaign.itemCount += 1;
    campaign.items.push(item);
  });

  const rootOrder = { "tree-product": 0, "tree-region": 1, "tree-brand": 2 };
  return [...rootMap.values()]
    .sort((a, b) => (rootOrder[a.key] ?? 9) - (rootOrder[b.key] ?? 9))
    .map((root) => ({
      ...root,
      children: [...root.children.values()].map((line) => ({
        ...line,
        children: [...line.children.values()].map((product) => ({
          ...product,
          children: [...product.children.values()],
        })),
      })),
    }));
}

function peopleInGroup(people, group) {
  if (group.key === "PCT") return people.filter((person) => person.region === "PCT" || person.functionName === "PCT");
  if (group.key === "NA") return people.filter((person) => person.region === "北美");
  if (group.key === "EU") return people.filter((person) => person.region === "欧洲");
  if (group.key === "APAC") return people.filter((person) => person.region === "亚太");
  if (group.key === "JP-KR") return people.filter((person) => person.region === "日韩");
  if (group.key === "CN") return people.filter((person) => person.region === "中国");
  if (group.key === "Creative") return people.filter((person) => /设计|视频|Creative/.test(`${person.functionName} ${person.role}`));
  return [];
}

function personProjectLine(person) {
  const match = String(person.scope || "").match(/虚线：([^；。]+)/);
  return match?.[1] || "待分配 PCT 项目组";
}

function rolePersonSearchText(person) {
  return `${person.functionName || ""} ${person.role || ""} ${person.scope || ""}`;
}

function matchesRoleFunction(person, unit) {
  const text = rolePersonSearchText(person);
  return unit.patterns.some((pattern) => pattern.test(text));
}

function matchesRoleProject(person, project) {
  const text = `${person.scope || ""} ${personProjectLine(person)}`;
  return project.patterns.some((pattern) => pattern.test(text));
}

function matchesRoleGroup(person, group) {
  if (group.key === "PCT") return person.region === "PCT" || person.functionName === "PCT";
  return person.region === group.label;
}

function roleMatrixCellKey(group, unit, project) {
  return `${group.key}:${unit.key}:${project.key}`;
}

function roleMatrixPeople(people, group, unit, project) {
  return people
    .filter((person) => matchesRoleGroup(person, group))
    .filter((person) => !unit.patterns || matchesRoleFunction(person, unit))
    .filter((person) => matchesRoleProject(person, project));
}

function roleMatrixDefaultValue(people, group, unit, project) {
  return roleMatrixPeople(people, group, unit, project)
    .map((person) => person.name)
    .join("、");
}

function roleMatrixCellValue(people, group, unit, project, state) {
  const key = roleMatrixCellKey(group, unit, project);
  const overrides = state.roleMatrixOverrides || {};
  return Object.prototype.hasOwnProperty.call(overrides, key) ? overrides[key] : roleMatrixDefaultValue(people, group, unit, project);
}

function splitRoleMatrixValue(value) {
  return String(value || "")
    .split(/[、,，\n/]+/)
    .map((item) => item.trim())
    .filter(Boolean);
}

function renderRoleMatrixCell(people, group, unit, project, state) {
  const value = roleMatrixCellValue(people, group, unit, project, state);
  const names = splitRoleMatrixValue(value);
  const key = roleMatrixCellKey(group, unit, project);
  const isEditing = state.roleMatrixEditingGroup === group.key;

  if (isEditing) {
    return `
      <td class="role-matrix-cell editing">
        <textarea data-role-matrix-field="${escapeHtml(key)}" aria-label="${escapeHtml(group.label)} ${escapeHtml(unit.label)} ${escapeHtml(project.label)}">${escapeHtml(value)}</textarea>
      </td>
    `;
  }

  if (!names.length) {
    return `
      <td class="role-matrix-cell empty">
        <span class="role-matrix-empty">待配置</span>
      </td>
    `;
  }

  return `
    <td class="role-matrix-cell configured">
      <div class="role-matrix-assignee-list">
        ${names
          .slice(0, 4)
          .map(
            (name) => `
              <span class="role-assignee-chip">
                <strong>${escapeHtml(name)}</strong>
              </span>
            `,
          )
          .join("")}
        ${names.length > 4 ? `<small>+${names.length - 4}</small>` : ""}
      </div>
    </td>
  `;
}

function renderRoleMatrixRows(people, state) {
  return ROLE_MATRIX_GROUPS.map((group) => {
    const isEditing = state.roleMatrixEditingGroup === group.key;
    const rows = group.units.map((unit, index) => `
      <tr class="${index === 0 ? "region-start" : ""}">
        ${
          index === 0
            ? `<th class="role-matrix-region" scope="rowgroup" rowspan="${group.units.length}">
                <strong>${escapeHtml(group.label)}</strong>
                <span>${escapeHtml(group.english)}</span>
                <button class="role-matrix-group-action ${isEditing ? "saving" : ""}" type="button" data-role-matrix-group="${escapeHtml(group.key)}">
                  ${isEditing ? "保存" : "编辑"}
                </button>
              </th>`
            : ""

function getApprovalFilterOptions(rules, key, allLabel) {
  const values = rules.map((rule) => rule[key]).filter(Boolean);
  return [allLabel, ...new Set(values.filter((value) => value !== allLabel))];
}

function approvalRuleTitle(rule) {
  return rule.eventName || rule.eventType || "未命名事件";
}

function normalizeApprovalSteps(rule) {
  if (Array.isArray(rule.steps) && rule.steps.length) return rule.steps;
  return String(rule.flow || "Owner 提交 -> 审批人确认 -> 更新状态")
    .split("->")
    .map((step) => step.trim())
    .filter(Boolean)
    .map((step) => ({ role: step, source: "", action: "", output: "" }));
}

function matchApprovalFilter(value, selectedValue, allLabel) {
  if (!selectedValue || selectedValue === allLabel) return true;
  if (!value || value === allLabel || /^全部/.test(value)) return true;
  return value === selectedValue;
}

function filterApprovalRoutes(rules, filters) {
  const search = filters.search.trim().toLowerCase();
  return rules.filter((rule) => {
    const text = [
      approvalRuleTitle(rule),
      rule.category,
      rule.initiator,
      rule.initiatorSource,
      rule.trigger,
      rule.approvalType,
      rule.flow,
      rule.detail,
    ]
      .filter(Boolean)
      .join(" ")
      .toLowerCase();
    return !search || text.includes(search);
  });
}

}

function getPushFilterOptions(rules, key, allLabel) {
  const values = rules.map((rule) => rule[key]).filter(Boolean);
  return [allLabel, ...new Set(values.filter((value) => value !== allLabel))];
}

function pushRuleTitle(rule) {
  return rule.eventName || rule.contentType || "未命名推送事件";
}

function normalizePushReceivers(rule) {
  if (Array.isArray(rule.receivers) && rule.receivers.length) return rule.receivers;
  if (rule.receiver) return [{ role: rule.receiver, source: "旧版配置", reason: "需要知道这个变化" }];
  return [{ role: "相关 Owner", source: "角色主表自动匹配", reason: "需要知道这个状态变化" }];
}

function matchPushFilter(value, selectedValue, allLabel) {
  if (!selectedValue || selectedValue === allLabel) return true;
  if (!value || value === allLabel || /^全部/.test(value)) return true;
  return value === selectedValue;
}

function filterPushRules(rules, filters) {
  const search = filters.search.trim().toLowerCase();
  return rules.filter((rule) => {
    const receivers = normalizePushReceivers(rule);
    const text = [
      pushRuleTitle(rule),
      rule.category,
      rule.triggerState,
      rule.condition,
      rule.priority,
      rule.channel,
      rule.frequency,
      rule.messageTemplate,
      rule.actionLabel,
      ...receivers.map((receiver) => `${receiver.role} ${receiver.source} ${receiver.reason}`),
    ]
      .filter(Boolean)
      .join(" ")
      .toLowerCase();

    return !search || text.includes(search);
  });
}

/* src/lib/copyEditModel.js */
const COPY_EDIT_SCHEMA_VERSION = 1;
const COPY_EDIT_SOURCE_VERSION = "v0.6.37";
const COPY_EDIT_ROOT = "mktOsHome";

const SKIPPED_KEYS = new Set(["id"]);
const GENERIC_VALUES = new Set([
  "AI",
  "PR",
  "S",
  "A",
  "B",
  "C",
  "Campaign",
  "Brief",
  "Todo",
  "Signal",
  "Decision",
  "Resource",
  "Recommendation",
  "Delegation",
  "Observation",
  "Outcome",
  "Learning",
]);

function isRecord(value) {
  return Boolean(value) && typeof value === "object" && !Array.isArray(value);
}

function encodePathToken(value) {
  return encodeURIComponent(String(value));
}

function decodePathToken(value) {
  return decodeURIComponent(String(value || ""));
}

function arraySelectorForItem(item, index) {
  if (isRecord(item) && typeof item.id === "string" && item.id) return `[id=${encodePathToken(item.id)}]`;
  if (isRecord(item) && typeof item.key === "string" && item.key) return `[key=${encodePathToken(item.key)}]`;
  return `[${index}]`;
}

function shouldCollectString(key, value) {
  const text = String(value || "").trim();
  if (!text || SKIPPED_KEYS.has(key)) return false;
  if (text.length > 1600) return false;
  if (GENERIC_VALUES.has(text)) return false;
  if (text.length < 3 && !/[\u4e00-\u9fff]/.test(text)) return false;
  if (/^https?:\/\//i.test(text)) return false;
  return true;
}

function collectEditableCopyEntries(root, rootName = COPY_EDIT_ROOT) {
  const entries = [];

  function visit(value, path, key = "") {
    if (typeof value === "string") {
      if (shouldCollectString(key, value)) entries.push({ path, value });
      return;
    }

    if (Array.isArray(value)) {
      value.forEach((item, index) => visit(item, `${path}${arraySelectorForItem(item, index)}`, key));
      return;
    }

    if (!isRecord(value)) return;

    Object.entries(value).forEach(([childKey, childValue]) => {
      if (Array.isArray(childValue)) {
        childValue.forEach((item, index) => visit(item, `${path}.${childKey}${arraySelectorForItem(item, index)}`, childKey));
        return;
      }

      visit(childValue, `${path}.${childKey}`, childKey);
    });
  }

  visit(root, rootName);
  return entries;
}

function parsePathSegment(segment) {
  const match = /^([A-Za-z_$][\w$]*)(?:\[(?:(id|key)=([^\]]+)|(\d+))\])?$/.exec(segment);
  if (!match) return null;

  return {
    prop: match[1],
    selectorType: match[2] || (match[4] ? "index" : ""),
    selectorValue: match[3] ? decodePathToken(match[3]) : match[4],
  };
}

function splitCopyPath(path) {
  if (typeof path !== "string" || !path.startsWith(`${COPY_EDIT_ROOT}.`)) return null;

  const segments = [];
  let current = "";
  let bracketDepth = 0;

  for (const char of path) {
    if (char === "." && bracketDepth === 0) {
      segments.push(current);
      current = "";
      continue;
    }

    if (char === "[") bracketDepth += 1;
    if (char === "]") bracketDepth -= 1;
    current += char;
  }

  if (current) segments.push(current);
  if (segments.shift() !== COPY_EDIT_ROOT) return null;

  return segments.map(parsePathSegment).filter(Boolean);
}

function isSafeCopyPath(path) {
  const segments = splitCopyPath(path);
  return Boolean(segments?.length);
}

function resolveSegment(container, segment) {
  if (!isRecord(container)) return undefined;

  const value = container[segment.prop];
  if (!segment.selectorType) return value;
  if (!Array.isArray(value)) return undefined;

  if (segment.selectorType === "index") return value[Number(segment.selectorValue)];
  return value.find((item) => isRecord(item) && String(item[segment.selectorType]) === segment.selectorValue);
}

function setFinalSegment(container, segment, nextValue) {
  if (!isRecord(container)) return false;

  if (!segment.selectorType) {
    container[segment.prop] = nextValue;
    return true;
  }

  const list = container[segment.prop];
  if (!Array.isArray(list)) return false;

  if (segment.selectorType === "index") {
    const index = Number(segment.selectorValue);
    if (!Number.isInteger(index) || index < 0 || index >= list.length) return false;
    list[index] = nextValue;
    return true;
  }

  const item = list.find((candidate) => isRecord(candidate) && String(candidate[segment.selectorType]) === segment.selectorValue);
  if (!item) return false;
  return false;
}

function setCopyEditValue(root, path, nextValue) {
  const segments = splitCopyPath(path);
  if (!segments?.length) return false;

  let container = root;
  for (let index = 0; index < segments.length - 1; index += 1) {
    container = resolveSegment(container, segments[index]);
    if (container === undefined) return false;
  }

  return setFinalSegment(container, segments[segments.length - 1], String(nextValue ?? ""));
}

function applyCopyEdits(root, edits = {}) {
  Object.entries(edits).forEach(([path, value]) => {
    setCopyEditValue(root, path, value);
  });

  return root;
}

function normaliseCopyEditsPayload(payload = {}) {
  const safeEdits = {};
  const inputEdits = isRecord(payload.edits) ? payload.edits : {};

  Object.entries(inputEdits).slice(0, 6000).forEach(([path, value]) => {
    if (!isSafeCopyPath(path)) return;

    const text = String(value ?? "");
    if (text.length > 2000) return;
    safeEdits[path] = text;
  });

  return {
    schemaVersion: COPY_EDIT_SCHEMA_VERSION,
    sourceVersion: String(payload.sourceVersion || COPY_EDIT_SOURCE_VERSION),
    edits: safeEdits,
  };
}

function findUnsafeCopyEditPaths(payload = {}) {
  const inputEdits = isRecord(payload.edits) ? payload.edits : {};

  return Object.entries(inputEdits)
    .filter(([path, value]) => !isSafeCopyPath(path) || String(value ?? "").length > 2000)
    .map(([path]) => path);
}

function findKnowledgeNodeById(nodes, targetId) {
  for (const node of nodes || []) {
    if (node.id === targetId) return node;
    const childMatch = findKnowledgeNodeById(node.children, targetId);
    if (childMatch) return childMatch;
  }

  return null;
}

function findKnowledgePath(nodes, targetId, path = []) {
  for (const node of nodes || []) {
    const nextPath = [...path, node];
    if (node.id === targetId) return nextPath;
    const childPath = findKnowledgePath(node.children, targetId, nextPath);
    if (childPath.length) return childPath;
  }

  return [];
}

function optionLabel(node) {
  return node?.label || "未命名";
}

function setSelectOptions(select, nodes, selectedValue = "") {
  if (!select) return;

  const safeNodes = asList(nodes).filter(Boolean);
  select.innerHTML = "";
  safeNodes.forEach((node) => {
    const option = new Option(optionLabel(node), node.id);
    select.add(option);
  });

  const nextValue = safeNodes.some((node) => node.id === selectedValue) ? selectedValue : safeNodes[0]?.id;
  if (nextValue) select.value = nextValue;
}

function mountNodesForBranch(branchNode) {

function campaignClassFromType(type = "") {
  const value = String(type).toLowerCase();
  if (value.includes("launch") || type.includes("新品")) return "launch";
  if (value.includes("refresh") || type.includes("刷新")) return "refresh";
  if (type.includes("大促")) return "promo";
  if (type.includes("节日")) return "seasonal";
  if (value.includes("always")) return "always";
  if (type.includes("场景")) return "scenario";
  if (value.includes("sustaining") || type.includes("持续")) return "sustaining";
  return "sustaining";
}

function setValueOptions(select, options, selectedValue = "") {
  if (!select) return;

  const previousValue = selectedValue || select.value;
  select.innerHTML = "";
  options.forEach((option) => {
    select.add(new Option(option.label, option.value));
  });
  select.value = options.some((option) => option.value === previousValue) ? previousValue : options[0]?.value || "";
}

function syncCampaignStageAndType(form) {
  const pillarId = form.elements.knowledgePillar?.value || "tree-product";
  const options = campaignTypeOptionsForPillar(pillarId);
  const stageOptions = options.filter((option) => option.value !== "其他");
  setValueOptions(form.querySelector("[data-stage-select]"), stageOptions);
  setValueOptions(form.querySelector("[data-campaign-type-select]"), options);
}

function syncCreateCampaignTaxonomy(form, changedLevel = "init") {
  const pillarSelect = form.elements.knowledgePillar;
  const branchSelect = form.elements.knowledgeBranch;
  const mountSelect = form.elements.knowledgeNodeId;
  if (!pillarSelect || !branchSelect || !mountSelect) return;

  const pillarNode = findKnowledgeNodeById(mktOsHome.campaignKnowledgeTree, pillarSelect.value) || mktOsHome.campaignKnowledgeTree[0];
  const branchNodes = asList(pillarNode?.children);

  if (changedLevel === "pillar" || !branchNodes.some((node) => node.id === branchSelect.value)) {
    setSelectOptions(branchSelect, branchNodes, branchNodes[0]?.id);
  }

  const branchNode = findKnowledgeNodeById(branchNodes, branchSelect.value) || branchNodes[0];
  const mountNodes = mountNodesForBranch(branchNode);
  if (changedLevel !== "node" || !mountNodes.some((node) => node.id === mountSelect.value)) {
    setSelectOptions(mountSelect, mountNodes, mountSelect.value);
  }

  syncMountPath(form);
  syncCampaignStageAndType(form);
}

function syncCampaignTypeOther(form) {
  const typeSelect = form.querySelector("[data-campaign-type-select]");
  const otherField = form.querySelector("[data-campaign-type-other]");
  if (!typeSelect || !otherField) return;

  const isOther = typeSelect.value === "其他";
  otherField.classList.toggle("hidden", !isOther);
  const input = otherField.querySelector("input");
  if (input) input.disabled = !isOther;
}

function updateRegionPicker(picker, changedInput = null) {
  if (!picker) return;

  const boxes = Array.from(picker.querySelectorAll("[data-region-choice]"));
  const globalBox = boxes.find((box) => box.value === "全球");
  if (changedInput?.value === "全球" && changedInput.checked) {
    boxes.forEach((box) => {
      if (box !== globalBox) box.checked = false;
    });
  } else if (changedInput?.checked && globalBox) {
    globalBox.checked = false;
  }

  if (!boxes.some((box) => box.checked) && globalBox) {
    globalBox.checked = true;
  }

  boxes.forEach((box) => {
    box.closest(".campaign-region-choice")?.classList.toggle("selected", box.checked);
  });

  const selectedValues = boxes.filter((box) => box.checked).map((box) => box.value);
  const hiddenInput = picker.querySelector("[data-region-value]");
  if (hiddenInput) hiddenInput.value = selectedValues.join("+") || "全球";
}

function formatDateWindow(value) {
  if (!value) return "";
  const [, month, day] = value.split("-");
  if (!month || !day) return value;
  return `${Number(month)}.${Number(day)}`;
}

function updateCreateCampaignTimeframe(form) {
  const start = form.querySelector("[data-date-start]")?.value;
  const end = form.querySelector("[data-date-end]")?.value;
  const hiddenInput = form.querySelector("[data-timeframe-value]");
  if (!hiddenInput) return;

  const startLabel = formatDateWindow(start);
  const endLabel = formatDateWindow(end);
  hiddenInput.value = [startLabel, endLabel].filter(Boolean).join(" - ");
}

function escapeText(value) {
  return String(value || "")
    .trim()
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function getFormText(formData, key, fallback = "") {
  return escapeText(formData.get(key)) || fallback;
}

function getFormList(formData, key, fallback = []) {
  const values = formData.getAll(key).map((value) => escapeText(value)).filter(Boolean);
  return values.length ? values : fallback;
}

function joinFormText(formData, fields, fallback = "") {
  const lines = fields
    .map(({ key, label }) => {
      const value = getFormText(formData, key, "");
      return value ? `${label}：${value}` : "";
    })
    .filter(Boolean);

  return lines.length ? lines.join("\n") : fallback;
}

function splitLines(value) {
  return String(value || "")
    .split(/\n+/)
    .map((line) => line.trim())
    .filter(Boolean);
}

function asList(value) {
  if (Array.isArray(value)) return value;
  return value ? [value] : [];
}

function firstLine(value, fallback) {
  return splitLines(value)[0] || fallback;
}

function getPriorityTone(level) {
  const toneMap = {
    S: "red",
    A: "yellow",
    B: "green",
    C: "blue",
  };

  return toneMap[level] || "blue";
}

function buildPhaseTimeline(milestones, stage, timeframe) {
  const lines = splitLines(milestones);
  const fallbackLines = [`${stage}：完成 Campaign Context 首轮确认`, "下一阶段：解锁行动计划并分派 Owner"];

  return (lines.length ? lines : fallbackLines).slice(0, 4).map((line, index) => {
    const [rawName, ...rest] = line.split(/[：:]/);
    const goal = rest.join("：").trim() || line;
    const name = rawName.replace(/^Phase\s*\d+\s*/i, "").trim() || `${stage} ${index + 1}`;

    return {
      phase: `Phase ${index + 1}`,
      name,
      window: timeframe || "待设置",
      goal,
      owner: index === 0 ? "PCT · 张宁" : "Owner 可编辑",
      checkpoint: index === 0 ? "Context 确认" : "判断点可编辑",
    };
  });
}

function attachCampaignToKnowledgeNode(nodes, targetNodeId, campaignId) {
  for (const node of nodes || []) {
    if (node.id === targetNodeId) {
      const existingIds = asList(node.linkedCampaignIds);
      node.linkedCampaignIds = existingIds.includes(campaignId) ? existingIds : [...existingIds, campaignId];
      return true;
    }
    if (attachCampaignToKnowledgeNode(node.children, targetNodeId, campaignId)) {
      return true;
    }
  }

  return false;
}

function applyTaskEditDrafts() {
  const campaign = mktOsHome.campaigns.find((item) => item.id === state.selectedCampaignId);
  if (!campaign) return 0;

  let editedCount = 0;
  document.querySelectorAll("[data-operation-task-card]").forEach((card) => {
    const taskId = card.dataset.operationTaskCard?.replace(/^task:/, "");
    const plan = asList(campaign.actionPlans).find((item) => item.id === taskId);
    if (!plan) return;

    const nextValues = {};
    card.querySelectorAll("[data-task-edit-step]").forEach((textarea) => {
      nextValues[textarea.dataset.taskEditStep] = textarea.value.trim();
    });

    if (!Object.keys(nextValues).length) return;

    if (nextValues.brief) plan.description = nextValues.brief;
    if (nextValues.plan) plan.experiment = nextValues.plan;
    if (nextValues.feedback) plan.feedback = nextValues.feedback;
    if (nextValues.context) plan.contextUpdate = nextValues.context;
    if (nextValues.todo) plan.nextTodo = nextValues.todo;
    editedCount += 1;
  });

  if (editedCount) {
    campaign.lastSync = "刚刚";
  }

  return editedCount;
}

function getMilestoneFallback(campaign) {
  return campaign.phaseTimeline.map((item) => `${item.phase}：${item.goal}`).join("\n");
}

function splitIndicatorText(text, fallbackLabel) {
  const value = String(text || "").trim();
  if (!value) return null;
  const [labelPart, ...rest] = value.split(/[：:]/);
  if (!rest.length) {
    return { label: fallbackLabel, value, note: "可继续细化为目标值和判断口径。" };
  }

  return {
    label: labelPart.trim() || fallbackLabel,
    value: rest.join("：").trim() || value,
    note: "从新建 Campaign 表单写入，可在 Brief 编辑中继续拆细。",
  };
}

function firstLevelIndicatorsFromForm(formData, campaign = null) {
  const indicatorFields = [
    ["indicatorOne", "indicatorLabel0", "indicatorValue0", "indicatorNote0", "红人"],
    ["indicatorTwo", "indicatorLabel1", "indicatorValue1", "indicatorNote1", "社媒"],
    ["indicatorThree", "indicatorLabel2", "indicatorValue2", "indicatorNote2", "广告投放"],
    ["indicatorCustom", "indicatorLabel3", "indicatorValue3", "indicatorNote3", "自定义指标"],
  ];

  return indicatorFields
    .map(([freeTextKey, labelKey, valueKey, noteKey, fallbackLabel], index) => {
      const explicitLabel = getFormText(formData, labelKey, "");
      const explicitValue = getFormText(formData, valueKey, "");
      const explicitNote = getFormText(formData, noteKey, "");
      if (explicitLabel || explicitValue || explicitNote) {
        return {
          label: explicitLabel || fallbackLabel,
          value: explicitValue || (index === 3 ? "待编辑" : "待拆解"),
          note: explicitNote || "用于支撑上方北极星指标。",
          addable: index === 3,
        };
      }

      const parsed = splitIndicatorText(getFormText(formData, freeTextKey, ""), fallbackLabel);
      if (parsed) return { ...parsed, addable: index === 3 };

      const existing = campaign?.firstLevelIndicators?.[index];
      if (existing) return existing;

      return index === 3
        ? { label: fallbackLabel, value: "待编辑", note: "点击编辑 Brief 后补充新的一级指标", addable: true }
        : null;
    })
    .filter(Boolean);
}

  const keyMessage = getFormText(formData, "keyMessage", asList(campaign.messageHouse?.keyMessages).join(" / ") || campaign.messageHouse.slogan || "");
  const briefMilestones = getFormText(formData, "briefMilestones", getMilestoneFallback(campaign));
  const productDefinition = getFormText(formData, "productDefinition", productPower || campaign.messageHouse.positioning || campaign.name);
  const sellingPoints = getFormText(formData, "sellingPoints", keyMessage || campaign.messageHouse.sellingPoints || campaign.thesis);
  const marketPosition = getFormText(formData, "marketPosition", campaign.messageHouse.valueProposition || campaign.summary);
  const fourPs = getFormText(formData, "fourPs", campaign.productStrategy?.fourPs || sellingPoints);
  const targetAudience = getFormText(formData, "targetAudience", campaign.audienceInsight.targetAudience);

  const mustSay = getFormText(formData, "mustSay", productPower || campaign.contentStrategyTemplate.mustSay);
  const scriptReference = getFormText(formData, "scriptReference", currentJudgement || campaign.contentStrategyTemplate.scriptReference);
  const milestones = getFormText(formData, "milestones", briefMilestones);
  const latestSignal = "Shared Context 已在本地更新，等待 PCT 复核后再分派行动。";
  const firstLevelIndicators = firstLevelIndicatorsFromForm(formData, campaign);

  campaign.messageHouse = {
    ...campaign.messageHouse,

    usageScenario,
    needInsight,

    move: contentTopic || mustSay,

function parseApprovalSteps(formData) {
  const structuredSteps = Array.from({ length: 4 }, (_, index) => ({
    role: getFormText(formData, `stepRole${index}`, ""),
    source: getFormText(formData, `stepSource${index}`, ""),
    action: getFormText(formData, `stepAction${index}`, ""),
    output: getFormText(formData, `stepOutput${index}`, ""),
  })).filter((step) => step.role || step.source || step.action || step.output);

  if (structuredSteps.length) {
    return structuredSteps.map((step) => ({
      role: step.role || "审批角色",
      source: step.source || "角色来源待配置",
      action: step.action || "确认这一步是否可以通过",
      output: step.output || "通过后进入下一步",
    }));
  }

  return String(getFormText(formData, "stepsText", ""))
    .split("\n")
    .map((line) => line.trim())
    .filter(Boolean)
    .map((line) => {
      const [role = "审批角色", source = "角色来源待配置", action = "确认这一步是否可以通过", output = "通过后进入下一步"] = line.split(/[｜|]/).map((part) => part.trim());
      return { role, source, action, output };
    });
}

function getCopyEntryMap() {
  const entryMap = new Map();

  collectEditableCopyEntries(mktOsHome).forEach((entry) => {
    const value = String(entry.value || "").trim();
    if (!value) return;

    const existingEntries = entryMap.get(value) || [];
    existingEntries.push(entry.path);
    entryMap.set(value, existingEntries);
  });

  return entryMap;
}

function isEditableTextHost(node) {
  const element = node.parentElement;
  if (!element) return false;

  const blockedHost = element.closest("script, style, textarea, input, select, option, svg, [data-copy-path], .copy-edit-toolbar");
  return !blockedHost;
}

function buildEditableTextSpan(text, path) {
  const span = document.createElement("span");
  span.className = "copy-editable-text";
  span.dataset.copyPath = path;
  span.contentEditable = "true";
  span.spellcheck = false;
  span.textContent = text;
  span.title = "点击编辑这段底表文案";
  return span;
}

function decorateTextNode(textNode, entryMap, candidates, usage) {
  if (!isEditableTextHost(textNode)) return;

  const rawText = textNode.nodeValue || "";
  const trimmedText = rawText.trim();
  if (!trimmedText) return;

  const exactPaths = entryMap.get(trimmedText);
  if (exactPaths?.length) {
    const usageIndex = usage.get(trimmedText) || 0;
    const path = exactPaths[Math.min(usageIndex, exactPaths.length - 1)];
    usage.set(trimmedText, usageIndex + 1);
    textNode.parentNode.replaceChild(buildEditableTextSpan(rawText, path), textNode);
    return;
  }

  const match = candidates.find((candidate) => trimmedText.includes(candidate));
  if (!match) return;

  const rawIndex = rawText.indexOf(match);
  if (rawIndex < 0) return;

  const matchPaths = entryMap.get(match);
  const usageIndex = usage.get(match) || 0;
  const path = matchPaths[Math.min(usageIndex, matchPaths.length - 1)];
  usage.set(match, usageIndex + 1);

  const fragment = document.createDocumentFragment();
  const before = rawText.slice(0, rawIndex);
  const after = rawText.slice(rawIndex + match.length);
  if (before) fragment.appendChild(document.createTextNode(before));
  fragment.appendChild(buildEditableTextSpan(match, path));
  if (after) fragment.appendChild(document.createTextNode(after));
  textNode.parentNode.replaceChild(fragment, textNode);
}

function decorateEditableCopy() {
  if (!state.copyEditMode) return;

  const appRoot = document.querySelector("#app");
  const entryMap = getCopyEntryMap();
  const candidates = [...entryMap.keys()].sort((a, b) => b.length - a.length);
  const usage = new Map();
  const walker = document.createTreeWalker(appRoot, NodeFilter.SHOW_TEXT);
  const nodes = [];

  while (walker.nextNode()) {
    nodes.push(walker.currentNode);
  }

  nodes.forEach((node) => decorateTextNode(node, entryMap, candidates, usage));
}

function normaliseEditableText(value) {
  return String(value || "")
    .replace(/\u00a0/g, " ")
    .replace(/\n{3,}/g, "\n\n")
    .trim();
}

function getCopyEditDraftEdits() {
  return state.copyEditDraftEdits || state.copyEditPersistedEdits || {};
}

function countUnsavedCopyEdits(draftEdits, persistedEdits) {
  const paths = new Set([...Object.keys(draftEdits), ...Object.keys(persistedEdits)]);

  return [...paths].filter((path) => (draftEdits[path] || "") !== (persistedEdits[path] || "")).length;
}

function getUnsavedCopyEditCount() {
  return countUnsavedCopyEdits(getCopyEditDraftEdits(), state.copyEditPersistedEdits || {});
}

function collectCurrentCopyEditsFromDom() {
  const nextEdits = {
    ...(state.copyEditPersistedEdits || {}),
    ...getCopyEditDraftEdits(),
  };

  document.querySelectorAll("[data-copy-path]").forEach((element) => {
    const path = element.dataset.copyPath;
    const nextValue = normaliseEditableText(element.innerText || element.textContent);
    const baseValue = copyEditBaseValues[path] ?? "";

    if (nextValue === baseValue) {
      delete nextEdits[path];
    } else {
      nextEdits[path] = nextValue;
    }
  });

  return nextEdits;
}

function updateCopyEditDraftFromElement(element) {
  const path = element?.dataset?.copyPath;
  if (!path) return;

  const nextValue = normaliseEditableText(element.innerText || element.textContent);
  const baseValue = copyEditBaseValues[path] ?? "";
  const nextDraftEdits = {
    ...(state.copyEditPersistedEdits || {}),
    ...getCopyEditDraftEdits(),
  };

  if (nextValue === baseValue) {
    delete nextDraftEdits[path];
    setCopyEditValue(mktOsHome, path, baseValue);
  } else {
    nextDraftEdits[path] = nextValue;
    setCopyEditValue(mktOsHome, path, nextValue);
  }

  state = {
    ...state,
    copyEditDraftEdits: nextDraftEdits,
    copyEditStatus: `文案编辑草稿中 · ${countUnsavedCopyEdits(nextDraftEdits, state.copyEditPersistedEdits || {})} 项未保存`,
    copyEditError: "",
    copyEditNotice: "草稿已在页面保留，点击保存才会写到底表",
    copyEditNoticeTone: "info",
  };
}

function bindCopyEditEvents() {
  document.addEventListener(
    "pointerdown",
    (event) => {
      if (!state.copyEditMode || !event.target.closest("[data-copy-path]")) return;
      event.stopPropagation();
    },
    true,
  );

  document.addEventListener(
    "click",
    (event) => {
      if (!state.copyEditMode || !event.target.closest("[data-copy-path]")) return;
      event.preventDefault();
      event.stopPropagation();
    },
    true,
  );

  document.addEventListener(
    "keydown",
    (event) => {
      if (!state.copyEditMode || !event.target.closest("[data-copy-path]")) return;
      event.stopPropagation();
    },
    true,
  );

  document.addEventListener(
    "input",
    (event) => {
      if (!state.copyEditMode) return;
      const copyTarget = event.target.closest("[data-copy-path]");
      if (!copyTarget) return;
      updateCopyEditDraftFromElement(copyTarget);
    },
    true,
  );
}

async function loadInitialCopyEdits() {
  copyEditBaseValues = Object.fromEntries(
    collectEditableCopyEntries(mktOsHome).map((entry) => [entry.path, String(entry.value || "").trim()]),
  );

  try {
    const response = await fetch(COPY_EDIT_ENDPOINT, { cache: "no-store" });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    const payload = normaliseCopyEditsPayload(await response.json());
    applyCopyEdits(mktOsHome, payload.edits);
    state = {
      ...state,
      copyEditPersistedEdits: payload.edits,
      copyEditDraftEdits: payload.edits,
      copyEditStatus: `本地底表已连接 · ${Object.keys(payload.edits).length} 项覆盖`,
      copyEditError: "",
      copyEditNotice: "",
    };
  } catch {
    state = {
      ...state,
      copyEditPersistedEdits: {},
      copyEditDraftEdits: {},
      copyEditStatus: "页面可预览，保存需通过 npm run dev 打开",
      copyEditError: "本地保存服务未连接",
      copyEditNotice: "本地保存服务未连接，当前只能预览不能写入底表",
      copyEditNoticeTone: "error",
    };
  }
}

async function saveCopyEditsToTable() {
  const nextEdits = collectCurrentCopyEditsFromDom();

  state = {
    ...state,
    copyEditSaving: true,
    copyEditStatus: "正在保存到本地底表...",
    copyEditError: "",
    copyEditNotice: "正在保存到本地底表...",
    copyEditNoticeTone: "info",
  };
  mount();
  bindFormEvents();

  try {
    const payload = {
      schemaVersion: COPY_EDIT_SCHEMA_VERSION,
      sourceVersion: COPY_EDIT_SOURCE_VERSION,
      edits: nextEdits,
    };
    const response = await fetch(COPY_EDIT_ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });

    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    const savedPayload = normaliseCopyEditsPayload(await response.json());
    applyCopyEdits(mktOsHome, savedPayload.edits);
    state = {
      ...state,
      copyEditSaving: false,
      copyEditPersistedEdits: savedPayload.edits,
      copyEditDraftEdits: savedPayload.edits,
      copyEditStatus: `已保存到底表 · ${Object.keys(savedPayload.edits).length} 项覆盖`,
      copyEditError: "",
      copyEditNotice: `已保存到底表 · ${Object.keys(savedPayload.edits).length} 项已写入`,
      copyEditNoticeTone: "success",
    };
  } catch {
    state = {
      ...state,
      copyEditSaving: false,
      copyEditStatus: "保存失败，页面内容未写入底表",
      copyEditError: "保存失败：请确认使用 npm run dev 打开本地服务",
      copyEditNotice: "保存失败：页面内容没有写入底表",
      copyEditNoticeTone: "error",
    };
  }

  mount();
  bindFormEvents();
}

      state = {
        ...state,
        taskActionMenuOpen: taskKey,
        workspaceFocusedTaskKey: taskKey,
      };
      mount();
      bindFormEvents();
      scrollToWorkspaceTask(taskKey);
      return;
    }

    if (button.dataset.taskActionMenu) {
      state = {
        ...state,
        taskActionMenuOpen: state.taskActionMenuOpen === button.dataset.taskActionMenu ? null : button.dataset.taskActionMenu,
      };
      mount();
      bindFormEvents();
      return;
    }

    if (button.hasAttribute("data-sidebar-toggle")) {
      state = { ...state, sidebarCollapsed: !state.sidebarCollapsed };
      mount();
      bindFormEvents();
      return;
    }

    if (button.hasAttribute("data-campaign-rail-toggle")) {
      state = { ...state, campaignRailCollapsed: !state.campaignRailCollapsed };
      mount();
      bindFormEvents();
      return;
    }

    if (button.dataset.knowledgeId) {
      const linkedCampaignId = button.dataset.knowledgeCampaignId;
      state = {
        ...state,
        selectedKnowledgeId: button.dataset.knowledgeId,
        selectedCampaignId: linkedCampaignId || state.selectedCampaignId,
        selectedDynamicId: null,
        selectedMemoryWeekId: null,
        selectedMemoryFunctionId: null,
        editContextOpen: false,
        operationCreateModal: null,
        contextSaveMessage: "",
      };
      mount();
      bindFormEvents();
      return;
    }

    if (button.dataset.memoryFunctionId) {
      const nextFunctionId = state.selectedMemoryFunctionId === button.dataset.memoryFunctionId ? null : button.dataset.memoryFunctionId;
      state = {
        ...state,
        selectedMemoryWeekId: state.selectedMemoryWeekId,
        selectedMemoryFunctionId: nextFunctionId,
      };
      mount();
      bindFormEvents();
      return;
    }

    if (button.dataset.memoryWeekId) {
      const nextWeekId = state.selectedMemoryWeekId === button.dataset.memoryWeekId ? null : button.dataset.memoryWeekId;
      state = {
        ...state,
        selectedMemoryWeekId: nextWeekId,
        selectedMemoryFunctionId: null,
      };
      mount();
      bindFormEvents();
      return;
    }

    if (button.dataset.memoryActionKey === "task-admin:edit-mode") {
      const nextActionStatus = { ...state.actionStatus };
      if (nextActionStatus["task-admin:edit-mode"]) {
        const editedCount = applyTaskEditDrafts();
        delete nextActionStatus["task-admin:edit-mode"];
        if (editedCount) {
          nextActionStatus["task-admin:edit-saved"] = `已保存 ${editedCount} 条任务`;
        }
      } else {
        nextActionStatus["task-admin:edit-mode"] = "编辑模式已开启";
        delete nextActionStatus["task-admin:edit-saved"];
      }
      state = {
        ...state,
        actionStatus: nextActionStatus,
      };
      mount();
      bindFormEvents();
      return;
    }

    if (button.dataset.campaignMemoryCloseKey) {
      const nextActionStatus = { ...state.actionStatus };
      delete nextActionStatus[button.dataset.campaignMemoryCloseKey];
      state = {
        ...state,
        actionStatus: nextActionStatus,
      };
      mount();
      bindFormEvents();
      return;
    }

    if (button.dataset.memoryActionKey) {
      if (/^campaign-history:.+:(edit|ingest)$/.test(button.dataset.memoryActionKey)) {
        const nextActionStatus = { ...state.actionStatus };
        if (nextActionStatus[button.dataset.memoryActionKey]) {
          delete nextActionStatus[button.dataset.memoryActionKey];
        } else {
          nextActionStatus[button.dataset.memoryActionKey] = button.dataset.afterLabel || "已打开";
        }
        state = {
          ...state,
          actionStatus: nextActionStatus,
        };
        mount();
        bindFormEvents();
        return;
      }

      state = {
        ...state,
        actionStatus: {
          ...state.actionStatus,
          [button.dataset.memoryActionKey]: button.dataset.afterLabel || "已写入史书",
        },
      };
      mount();
      bindFormEvents();
      return;
    }

    if (button.dataset.calendarCampaignFilter) {
      state = {
        ...state,
        calendarCampaign: button.dataset.calendarCampaignFilter,
        calendarFocus: "conflict",
        calendarAdviceIndex: 0,
        calendarSelectedEventId: null,
      };
      mount();
      bindFormEvents();
      scrollToCalendarTimeline();
      return;
    }

    if (button.dataset.calendarRegionFilter) {
      state = {
        ...state,
        calendarCampaign: "全部 Campaign",
        region: button.dataset.calendarRegionFilter,
        calendarFocus: "conflict",
        calendarAdviceIndex: 0,
        calendarSelectedEventId: null,
      };
      mount();
      bindFormEvents();
      scrollToCalendarTimeline();
      return;
    }

    if (button.dataset.calendarShift) {
      state = {
        ...state,
        calendarMonthOffset: (state.calendarMonthOffset || 0) + Number(button.dataset.calendarShift),
        calendarFocus: "conflict",
        calendarAdviceIndex: 0,
        calendarSelectedEventId: null,
      };
      mount();
      bindFormEvents();
      return;
    }

    if (button.dataset.calendarFocus) {
      state = { ...state, calendarFocus: button.dataset.calendarFocus, calendarSelectedEventId: null };
      mount();
      bindFormEvents();
      scrollToCalendarTimeline();
      return;
    }

    if (button.dataset.calendarAdviceStep) {
      state = {
        ...state,
        calendarAdviceIndex: (state.calendarAdviceIndex || 0) + Number(button.dataset.calendarAdviceStep || 0),
      };
      mount();
      bindFormEvents();
      return;
    }

    if (button.hasAttribute("data-calendar-advice-refresh")) {
      state = {
        ...state,
        calendarAdviceIndex: 0,
        calendarAdviceRefreshCount: (state.calendarAdviceRefreshCount || 0) + 1,
        calendarSelectedEventId: null,
      };
      mount();
      bindFormEvents();
      return;
    }

    if (button.dataset.calendarAdviceFocus) {
      state = {
        ...state,
        calendarFocus: button.dataset.calendarAdviceFocus,
        calendarSelectedEventId: null,
      };
      mount();
      bindFormEvents();
      scrollToCalendarTimeline();
      return;
    }

    if (button.dataset.calendarEvent) {
      state = {
        ...state,
        calendarSelectedEventId: button.dataset.calendarEvent,
      };
      mount();
      bindFormEvents();
      scrollToCalendarDetail();
      return;
    }

    if (button.dataset.contextToggle) {
      const key = button.dataset.contextToggle;
      state = {
        ...state,
        editContextOpen: false,
        contextOpen: {
          ...state.contextOpen,
          [key]: !state.contextOpen[key],
        },
      };
      mount();
      bindFormEvents();
      return;
    }

    if (button.dataset.campaignId) {
      const campaign = mktOsHome.campaigns.find((item) => item.id === button.dataset.campaignId);
      if (!campaign) return;

      state = {
        ...state,
        selectedCampaignId: campaign.id,
        selectedKnowledgeId: button.dataset.campaignKnowledgeId || `campaign:${campaign.id}`,
        selectedMemoryWeekId: null,
        selectedMemoryFunctionId: null,
        selectedDynamicId: null,
        editContextOpen: false,
        operationCreateModal: null,
        contextSaveMessage: "",
      };
      mount();
      bindFormEvents();
      return;
    }

    if (button.hasAttribute("data-context-edit-open")) {
      state = {
        ...state,
        editContextOpen: true,
        contextSaveMessage: "",
        contextOpen: {
          ...state.contextOpen,
          sharedContext: true,
        },
      };
      mount();
      bindFormEvents();
      return;
    }

    if (button.hasAttribute("data-context-edit-save")) {
      document.querySelector("[data-context-edit-form]")?.requestSubmit();
      return;
    }

    if (button.hasAttribute("data-context-edit-cancel")) {
      state = { ...state, editContextOpen: false };
      mount();
      bindFormEvents();
      return;
    }

    if (button.dataset.dynamicId) {
      state = {
        ...state,
        selectedDynamicId: state.selectedDynamicId === button.dataset.dynamicId ? null : button.dataset.dynamicId,
      };
      mount();
      bindFormEvents();
      return;
    }

    if (button.dataset.treeCreateSection) {
      if (button.dataset.treeCreateSection === "function-briefs") {
        state = {
          ...state,
          operationCreateModal: { sectionId: "function-briefs" },
        };
        mount();
        bindFormEvents();
        return;
      }

      const key = `tree-create:${state.selectedCampaignId}:${button.dataset.treeCreateSection}`;
      state = {
        ...state,
        actionStatus: {
          ...state.actionStatus,
          [key]: button.dataset.afterLabel || "已创建本地草稿",
        },
      };
      mount();
      bindFormEvents();
      return;
    }

    if (button.dataset.actionId) {
      const selectedActionId = button.dataset.planId || getActionId(state.selectedDynamicId);
      if (!selectedActionId) return;

      const key = `${selectedActionId}:${button.dataset.actionId}`;
      state = {
        ...state,
        actionStatus: {
          ...state.actionStatus,
          [key]: button.dataset.afterLabel || "已处理",
        },
      };
      mount();
      bindFormEvents();
    }
  });
}

async function bootstrap() {
  await loadInitialCopyEdits();
  mount();
  bindFormEvents();
  bindCopyEditEvents();
  bindClickEvents();
}

bootstrap();


})();
    </script>
  </body>
</html>
